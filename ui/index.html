<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>jm-mdv(Markdown Viewer)</title>
<link rel="stylesheet" href="preview.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    flex-direction: column;
    background: #1e1e2e;
  }

  /* ---------- 상단 툴바 ---------- */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(180deg, #2b2b40, #232336);
    border-bottom: 1px solid #3b3b55;
    flex-shrink: 0;
  }
  #toolbar button {
    font-family: inherit;
    font-size: 13px;
    color: #e4e4f0;
    background: #383854;
    border: 1px solid #4a4a6a;
    border-radius: 7px;
    padding: 6px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  #toolbar button:hover { background: #46466a; }
  #toolbar button:active { background: #52527a; }
  #toolbar button.primary {
    background: #6366f1;
    border-color: #7376ff;
    font-weight: 600;
  }
  #toolbar button.primary:hover { background: #7477f5; }
  #file-path {
    flex: 1;
    min-width: 0;
    margin-left: 8px;
    font-size: 13px;
    color: #a5a5c5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl; /* 긴 경로일 때 뒷부분(파일명)이 보이도록 */
    text-align: left;
  }
  #file-path .dirty { color: #fbbf24; font-weight: 700; }
  #file-path.clickable { cursor: pointer; }
  #file-path.clickable:hover .name { color: #a5b4fc; text-decoration: underline; }

  /* ---------- 파일 탭 바 ---------- */
  #tabbar {
    display: flex;
    align-items: stretch;
    background: #232336;
    border-bottom: 1px solid #3b3b55;
    flex-shrink: 0;
  }
  #tabbar > button {
    background: none;
    border: none;
    color: #8a8ab0;
    cursor: pointer;
    padding: 0 9px;
    font-size: 11px;
    flex-shrink: 0;
  }
  #tabbar > button:hover { color: #fff; background: #31314e; }
  #tabs {
    flex: 1;
    min-width: 0;
    display: flex;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 9px 6px 14px;
    font-size: 12.5px;
    color: #a5a5c5;
    cursor: pointer;
    border-right: 1px solid #2d2d44;
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
    max-width: 230px;
  }
  .tab:hover { background: #2b2b44; }
  .tab.active { background: #1e1e2e; color: #fff; box-shadow: inset 0 2px 0 #6366f1; }
  .tab-name { overflow: hidden; text-overflow: ellipsis; }
  .tab-name .dirty { color: #fbbf24; }
  .tab-close {
    font-size: 10px;
    color: #6b6b8f;
    border-radius: 3px;
    padding: 1px 4px;
  }
  .tab-close:hover { background: #44446a; color: #fff; }

  /* ---------- 본문: 좌우 분할 ---------- */
  #main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---------- 좌측 폴더 탐색 패널 ---------- */
  #sidebar {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.18s ease;
    background: #232336;
    border-right: 1px solid #3b3b55;
    display: flex;
    flex-direction: column;
  }
  #sidebar.open { width: 280px; }
  #sb-divider {
    width: 4px;
    flex-shrink: 0;
    background: #3b3b55;
    cursor: col-resize;
    display: none;
  }
  #sidebar.open + #sb-divider { display: block; }
  #sb-divider:hover { background: #6366f1; }
  #sidebar-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 7px 8px;
    border-bottom: 1px solid #3b3b55;
    min-width: 280px;
  }
  #sidebar-header button {
    background: none;
    border: none;
    color: #a5a5c5;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 7px;
    border-radius: 5px;
  }
  #sidebar-header button:hover { background: #383854; color: #fff; }
  #sb-path {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: #a5a5c5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
    text-align: left;
  }
  #sb-drives {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 10px;
    border-bottom: 1px solid #3b3b55;
    min-width: 280px;
  }
  .sb-drive {
    font-size: 12px;
    color: #c5c5dd;
    background: #31314e;
    border: 1px solid #44446a;
    border-radius: 5px;
    padding: 2px 9px;
    cursor: pointer;
    user-select: none;
  }
  .sb-drive:hover { background: #3d3d61; }
  .sb-drive.active { background: #4048a0; border-color: #6366f1; color: #fff; }
  #sb-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 5px 0;
    min-width: 280px;
  }
  #sb-list::-webkit-scrollbar-track { background: #232336; }
  #sb-list::-webkit-scrollbar-thumb { background: #3f3f5c; border-radius: 6px; }
  .sb-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    font-size: 13px;
    color: #c5c5dd;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .sb-item > span {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-item:hover { background: #31314e; }
  .sb-item.file.active { background: #4048a0; color: #fff; }
  .sb-empty { padding: 12px 14px; font-size: 12px; color: #6b6b8f; }
  /* 드래그 이동 시 놓을 수 있는 대상 표시 */
  .sb-item.drop-target { background: #4048a0; box-shadow: inset 0 0 0 1px #6366f1; color: #fff; }
  .sb-drive.drop-target { background: #4048a0; border-color: #6366f1; color: #fff; }
  /* 이름 변경 인라인 입력 */
  .sb-rename {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 13px;
    color: #fff;
    background: #1e1e2e;
    border: 1px solid #6366f1;
    border-radius: 4px;
    padding: 1px 6px;
    outline: none;
  }

  /* ---------- 우클릭 컨텍스트 메뉴 ---------- */
  #ctx-menu {
    position: fixed;
    z-index: 200;
    display: none;
    min-width: 160px;
    padding: 5px;
    background: #2b2b40;
    border: 1px solid #4a4a6a;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
  }
  .ctx-item {
    padding: 6px 12px;
    font-size: 13px;
    color: #e4e4f0;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .ctx-item:hover { background: #46466a; }
  .ctx-item.danger { color: #f87171; }
  .ctx-item.danger:hover { background: #7f1d1d; color: #fff; }
  #editor-pane, #preview-pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .pane-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 14px;
    text-transform: uppercase;
  }
  .btn-full {
    font-family: inherit;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 2px 8px;
    cursor: pointer;
    background: transparent;
  }
  #editor-pane .btn-full { color: #8a8ab0; }
  #editor-pane .btn-full:hover { background: #383854; color: #e4e4f0; }
  #preview-pane .btn-full { color: #6b7280; }
  #preview-pane .btn-full:hover { background: #dfe2e8; color: #1f2328; }

  /* 전체보기 모드 (분할 드래그로 지정된 고정 너비(inline flex)를 !important로 무시) */
  #main.full-editor #preview-pane, #main.full-editor #divider { display: none; }
  #main.full-preview #editor-pane, #main.full-preview #divider { display: none; }
  #main.full-editor #editor-pane { flex: 1 1 auto !important; }
  #main.full-preview #preview-pane { flex: 1 1 auto !important; }

  /* 맨 위로 가기 버튼 (연하게, 호버 시 진하게) */
  #editor-pane, #preview-pane { position: relative; }
  .scroll-top {
    position: absolute;
    right: 20px;
    bottom: 16px;
    z-index: 5;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(120, 120, 170, 0.35);
    background: rgba(120, 120, 170, 0.16);
    color: rgba(200, 200, 230, 0.6);
    font-size: 15px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s;
  }
  .scroll-top:hover { opacity: 1; background: rgba(99, 102, 241, 0.5); color: #fff; }
  #preview-pane .scroll-top {
    border-color: rgba(60, 60, 90, 0.25);
    background: rgba(120, 120, 150, 0.13);
    color: rgba(60, 60, 90, 0.55);
  }
  #preview-pane .scroll-top:hover { background: rgba(99, 102, 241, 0.75); color: #fff; }

  /* 탭 드래그 정렬 표시 */
  .tab.drag-over { box-shadow: inset 3px 0 0 #6366f1; }
  .tab.dragging { opacity: 0.4; }
  #editor-pane .pane-label { color: #8a8ab0; background: #232336; }
  /* 파일 생성일/수정일 표시 */
  #file-times {
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    font-size: 11px;
    color: #6b6b8f;
    margin-left: 12px;
    white-space: nowrap;
  }
  #preview-pane .pane-label { color: #6b7280; background: #eef0f4; border-bottom: 1px solid #e0e2e8; }

  #editor-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    background: #1e1e2e;
  }
  #editor {
    width: 100%;
    height: 100%;
    resize: none;
    border: 0;
    outline: none;
    padding: 18px 20px 60vh;
    background: transparent;
    position: relative;
    z-index: 1;
    color: #dcdcee;
    font-family: "Cascadia Code", Consolas, "D2Coding", monospace;
    font-size: 14px;
    line-height: 1.7;
    tab-size: 4;
    caret-color: #a5b4fc;
  }
  #editor::selection { background: #44446a; }

  /* ---------- 검색 하이라이트 (textarea 뒤에 겹쳐 그리는 레이어) ---------- */
  #editor-backdrop {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }
  #editor-highlights {
    /* #editor와 동일한 텍스트 배치가 되도록 폰트/패딩/줄바꿈 규칙을 맞춤 */
    padding: 18px 20px 60vh;
    font-family: "Cascadia Code", Consolas, "D2Coding", monospace;
    font-size: 14px;
    line-height: 1.7;
    tab-size: 4;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    color: transparent;
  }
  #editor-highlights mark { background: rgba(250, 204, 21, 0.3); color: transparent; border-radius: 2px; }
  /* 현재 검색 위치: 진한 주황 + 빛나는 테두리(펄스)로 강하게 강조 */
  #editor-highlights mark.current {
    background: #f97316;
    border-radius: 3px;
    animation: hl-pulse 0.9s ease-in-out infinite;
  }
  @keyframes hl-pulse {
    0%, 100% { box-shadow: 0 0 0 2px #fb923c, 0 0 16px 4px rgba(249, 115, 22, 0.95); }
    50%      { box-shadow: 0 0 0 4px #fdba74, 0 0 26px 9px rgba(249, 115, 22, 0.55); }
  }
  /* 프리뷰 쪽 검색 하이라이트 (pymdownx.mark의 ==하이라이트==와 구분되는 클래스) */
  #preview mark.search-hl {
    background: #fde047;
    color: inherit;
    padding: 0 1px;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(202, 138, 4, 0.45);
  }
  /* 프리뷰의 현재 검색 위치도 동일하게 강조 */
  #preview mark.search-hl.current {
    background: #f97316;
    color: #fff;
    border-radius: 3px;
    animation: hl-pulse 0.9s ease-in-out infinite;
  }

  /* ---------- 검색 바 ---------- */
  #search-bar {
    position: absolute;
    top: 27px;
    right: 18px;
    z-index: 6;
    display: none;
    align-items: center;
    gap: 5px;
    padding: 5px 7px;
    background: #2b2b40;
    border: 1px solid #4a4a6a;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
  }
  #search-bar.open { display: flex; }
  #search-input {
    width: 190px;
    font-family: inherit;
    font-size: 13px;
    color: #e4e4f0;
    background: #1e1e2e;
    border: 1px solid #4a4a6a;
    border-radius: 5px;
    padding: 4px 8px;
    outline: none;
  }
  #search-input:focus { border-color: #6366f1; }
  #search-count {
    font-size: 12px;
    color: #8a8ab0;
    min-width: 42px;
    text-align: center;
    white-space: nowrap;
  }
  .search-btn {
    font-family: inherit;
    font-size: 12px;
    color: #a5a5c5;
    background: none;
    border: none;
    border-radius: 5px;
    padding: 4px 7px;
    cursor: pointer;
  }
  .search-btn:hover { background: #46466a; color: #fff; }
  .search-btn.active { background: #4048a0; color: #fff; }

  #divider {
    width: 5px;
    flex-shrink: 0;
    background: #3b3b55;
    cursor: col-resize;
  }
  #divider:hover { background: #6366f1; }

  #preview-scroll {
    flex: 1;
    overflow-y: auto;
    background: #ffffff;
    padding: 24px 36px 60vh;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  #editor::-webkit-scrollbar-track { background: #1e1e2e; }
  #editor::-webkit-scrollbar-thumb { background: #3f3f5c; border-radius: 6px; }
  #preview-scroll::-webkit-scrollbar-track { background: #f4f5f7; }
  #preview-scroll::-webkit-scrollbar-thumb { background: #c9ccd4; border-radius: 6px; }

  /* ---------- 설명서 모달 ---------- */
  #help-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 20, 0.55);
  }
  #help-overlay.open { display: flex; }
  #help-modal {
    position: relative;
    display: flex;
    flex-direction: column;
    width: min(860px, 90vw);
    height: min(85vh, 900px);
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
  }
  #help-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: linear-gradient(180deg, #2b2b40, #232336);
    border-bottom: 1px solid #3b3b55;
    color: #e4e4f0;
    font-size: 14px;
    font-weight: 600;
    cursor: move;          /* 타이틀 바 드래그로 창 이동 */
    user-select: none;
  }
  #help-tabs { display: flex; gap: 5px; flex: 1; margin-left: 8px; }
  .help-tab {
    font-family: inherit;
    font-size: 12.5px;
    color: #a5a5c5;
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px 13px;
    cursor: pointer;
  }
  .help-tab:hover { background: #383854; color: #fff; }
  .help-tab.active { background: #4048a0; border-color: #6366f1; color: #fff; font-weight: 600; }
  #help-x {
    background: none;
    border: none;
    color: #a5a5c5;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 9px;
    border-radius: 5px;
  }
  #help-x:hover { background: #46466a; color: #fff; }
  /* 설명서 내 검색 */
  #help-search { display: flex; align-items: center; gap: 4px; cursor: default; }
  #help-search input {
    width: 150px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 400;
    color: #e4e4f0;
    background: #1e1e2e;
    border: 1px solid #4a4a6a;
    border-radius: 5px;
    padding: 3px 8px;
    outline: none;
  }
  #help-search input:focus { border-color: #6366f1; }
  #help-search-count {
    font-size: 11px;
    font-weight: 400;
    color: #8a8ab0;
    min-width: 34px;
    text-align: center;
    white-space: nowrap;
  }
  #help-body mark.help-hl { background: #fde047; color: inherit; padding: 0 1px; border-radius: 2px; }
  #help-body mark.help-hl.current { background: #fb923c; box-shadow: 0 0 0 1px #ea580c; }
  /* 모달 안 '맨 위로' 버튼 (스크롤 내리면 표시) */
  #help-top {
    position: absolute;
    right: 24px;
    bottom: 70px;
    z-index: 5;
    display: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(60, 60, 90, 0.25);
    background: rgba(120, 120, 150, 0.15);
    color: rgba(60, 60, 90, 0.55);
    font-size: 15px;
    cursor: pointer;
  }
  #help-top.show { display: block; }
  #help-top:hover { background: rgba(99, 102, 241, 0.75); color: #fff; }
  #help-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 36px;
    background: #ffffff;
  }
  #help-body::-webkit-scrollbar-track { background: #f4f5f7; }
  #help-body::-webkit-scrollbar-thumb { background: #c9ccd4; border-radius: 6px; }
  #help-footer {
    flex-shrink: 0;
    display: flex;
    justify-content: flex-end;
    padding: 10px 16px;
    border-top: 1px solid #e0e2e8;
    background: #f6f7f9;
  }
  #help-footer button {
    font-family: inherit;
    font-size: 13px;
    color: #fff;
    background: #6366f1;
    border: 1px solid #7376ff;
    border-radius: 7px;
    padding: 6px 20px;
    cursor: pointer;
    font-weight: 600;
  }
  #help-footer button:hover { background: #7477f5; }

  /* ---------- 하단 상태바 ---------- */
  #statusbar {
    flex-shrink: 0;
    display: flex;
    gap: 18px;
    padding: 4px 14px;
    font-size: 12px;
    color: #8a8ab0;
    background: #232336;
    border-top: 1px solid #3b3b55;
  }
  #statusbar .msg { color: #4ade80; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-new" title="새 문서 (Ctrl+N)">📄 새 파일</button>
  <button id="btn-dir" title="폴더 탐색 패널 열기/닫기">🗂️ 디렉토리</button>
  <button id="btn-open" title="파일 열기 (Ctrl+O)">📂 열기</button>
  <button id="btn-save" class="primary" title="저장 (Ctrl+S)">💾 저장</button>
  <button id="btn-saveas" title="다른 이름으로 저장 (Ctrl+Shift+S)">📝 다른 이름</button>
  <button id="btn-saveall" title="열린 파일 모두 저장">🗃️ 모두 저장</button>
  <button id="btn-closeall" title="열린 탭 모두 닫기 (변경사항은 파일마다 확인)">🚪 모두 닫기</button>
  <button id="btn-search" title="검색 (Ctrl+F)">🔍 검색</button>
  <button id="btn-export" title="미리보기 그대로 HTML로 저장">🌐 HTML 내보내기</button>
  <button id="btn-help" title="프로그램 기능/사용 설명서 보기">❓ 설명서</button>
  <div id="file-path"><span class="name">새 문서</span></div>
</div>

<div id="tabbar">
  <button id="tab-left" title="이전 파일 보기">◀</button>
  <div id="tabs"></div>
  <button id="tab-right" title="다음 파일 보기">▶</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <button id="sb-up" title="상위 폴더로">⬆️</button>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const previewScroll = document.getElementById('preview-scroll');
const filePathEl = document.getElementById('file-path');
const statPos = document.getElementById('stat-pos');
const statLen = document.getElementById('stat-len');
const statMsg = document.getElementById('stat-msg');

/* 다중 파일 탭 상태 */
let tabs = [];        // [{path, name, content, dirty}] (path=null → 새 문서)
let activeTab = null;
let currentPath = null;  // activeTab.path 미러 (편의용)
let renderTimer = null;
let msgTimer = null;

function baseName(p) { return p.split(/[\\/]/).pop(); }

const SAMPLE = `# Markdown View에 오신 것을 환영합니다! 🎉

좌측에서 **마크다운**을 수정하면 우측에 *실시간*으로 반영됩니다.

## 주요 기능

- 📂 파일 열기 / 💾 저장 (\`Ctrl+O\` / \`Ctrl+S\`)
- 🔄 좌우 **동기 스크롤**
- 🌐 미리보기 그대로 **HTML 내보내기**

## 문법 예시

> 인용문은 이렇게 표현됩니다.

| 기능 | 단축키 |
|------|--------|
| 저장 | Ctrl+S |
| 열기 | Ctrl+O |

\`\`\`python
def hello(name: str) -> str:
    return f"안녕하세요, {name}님!"
\`\`\`

- [x] 완료된 작업
- [ ] 해야 할 작업

~~취소선~~, ==하이라이트==, 그리고 [링크](https://example.com)도 지원합니다.
`;

/* ---------- 렌더링 (실시간) ----------
   변환 요청이 밀려 쌓이지 않도록: 진행 중이면 최신 내용 하나만 대기시키고,
   같은 내용은 다시 변환하지 않음 */
let rendering = false;
let renderQueued = false;
let lastRendered = null;

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderNow, 100);
}

async function renderNow() {
  const text = editor.value;
  if (text === lastRendered) return;   // 내용 그대로면 스킵
  if (rendering) { renderQueued = true; return; }
  rendering = true;
  try {
    const r = await window.pywebview.api.render(text);
    lastRendered = text;
    preview.innerHTML = r.html;
    if (searchBar && searchBar.classList.contains('open')) highlightPreview();
  } catch (e) { /* API 준비 전 호출은 무시 */ }
  rendering = false;
  if (renderQueued) {
    renderQueued = false;
    renderNow();                        // 대기 중이던 최신 내용 반영
  }
}

/* ---------- 상태 표시 ---------- */
const fileTimesEl = document.getElementById('file-times');

/* 에디터 상단에 현재 파일의 최초 생성일/최근 수정일 표시 */
async function updateFileTimes() {
  if (!currentPath) { fileTimesEl.textContent = ''; return; }
  const requested = currentPath;
  try {
    const r = await window.pywebview.api.file_times(requested);
    if (currentPath !== requested) return; // 응답 전에 탭이 바뀌면 무시
    fileTimesEl.textContent = r ? ('생성: ' + r.created + '  ·  수정: ' + r.modified) : '';
  } catch (e) { fileTimesEl.textContent = ''; /* API 준비 전 무시 */ }
}

function updatePath() {
  const name = currentPath || '새 문서';
  const dirty = activeTab ? activeTab.dirty : false;
  filePathEl.innerHTML = (dirty ? '<span class="dirty">● </span>' : '')
    + '<span class="name"></span>';
  filePathEl.querySelector('.name').textContent = name;
  filePathEl.classList.toggle('clickable', !!currentPath);
  filePathEl.title = currentPath ? name + '\n클릭하면 탐색기에서 이 파일 위치를 엽니다' : name;
  updateFileTimes();
}

filePathEl.addEventListener('click', () => {
  if (currentPath) window.pywebview.api.show_in_explorer();
});

function updateStats() {
  const pos = editor.selectionStart;
  const before = editor.value.slice(0, pos);
  const line = (before.match(/\n/g) || []).length + 1;
  const col = pos - before.lastIndexOf('\n');
  statPos.textContent = line + ':' + col;
  statLen.textContent = editor.value.length.toLocaleString() + '자';
}

function flash(msg) {
  statMsg.textContent = msg;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => statMsg.textContent = '', 3000);
}

function setDirty(d) {
  if (activeTab && activeTab.dirty !== d) {
    activeTab.dirty = d;
    updatePath();
    renderTabs();
  }
}

/* ---------- 동기 스크롤 ---------- */
let scrollSource = null;
let scrollResetTimer = null;

function syncScroll(src, dst) {
  if (scrollSource && scrollSource !== src) return;
  scrollSource = src;
  const srcMax = src.scrollHeight - src.clientHeight;
  const dstMax = dst.scrollHeight - dst.clientHeight;
  if (srcMax > 0) dst.scrollTop = (src.scrollTop / srcMax) * dstMax;
  clearTimeout(scrollResetTimer);
  scrollResetTimer = setTimeout(() => scrollSource = null, 120);
}

editor.addEventListener('scroll', () => syncScroll(editor, previewScroll));
previewScroll.addEventListener('scroll', () => syncScroll(previewScroll, editor));

/* ---------- 에디터 입력 ---------- */
editor.addEventListener('input', () => {
  setDirty(true);
  scheduleRender();
  updateStats();
  refreshSearch();
});
/* 키보드에서 손을 뗄 때마다 즉시 렌더링 */
editor.addEventListener('keyup', () => {
  updateStats();
  clearTimeout(renderTimer);
  renderNow();
});
editor.addEventListener('click', updateStats);

/* Tab 키 → 공백 4칸 삽입 */
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, epos = editor.selectionEnd;
    editor.setRangeText('    ', s, epos, 'end');
    setDirty(true);
    scheduleRender();
  }
});

/* ---------- 파일/탭 동작 ---------- */
const tabsEl = document.getElementById('tabs');

function syncEditorToTab() {
  if (activeTab) activeTab.content = editor.value;
}

/* 열린 탭 목록을 저장 → 다음 실행 때 그대로 복원 */
function saveSession() {
  try {
    const files = tabs.filter(t => t.path).map(t => t.path);
    const active = (activeTab && activeTab.path) ? files.indexOf(activeTab.path) : -1;
    window.pywebview.api.save_session(files, active);
  } catch (e) { /* API 준비 전이면 무시 */ }
}

function showActiveTab() {
  currentPath = activeTab ? activeTab.path : null;
  editor.value = activeTab ? activeTab.content : '';
  updatePath();
  updateStats();
  renderTabs();
  renderNow();
  markActiveFile();
  saveSession();
  refreshSearch();
}

let dragTab = null; // 드래그 중인 탭

function renderTabs() {
  tabsEl.innerHTML = '';
  for (const t of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (t === activeTab ? ' active' : '');
    /* 드래그로 탭 순서 변경 */
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      dragTab = t;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => { dragTab = null; renderTabs(); });
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (dragTab && dragTab !== t) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (!dragTab || dragTab === t) return;
      const from = tabs.indexOf(dragTab);
      const to = tabs.indexOf(t);
      tabs.splice(from, 1);
      tabs.splice(to, 0, dragTab);
      dragTab = null;
      renderTabs();
      saveSession();
    });
    const nm = document.createElement('span');
    nm.className = 'tab-name';
    nm.innerHTML = (t.dirty ? '<span class="dirty">● </span>' : '');
    nm.append(document.createTextNode(t.name));
    nm.title = t.path || '새 문서';
    const x = document.createElement('span');
    x.className = 'tab-close';
    x.textContent = '✕';
    x.title = '탭 닫기';
    x.addEventListener('click', (e) => { e.stopPropagation(); closeTab(t); });
    el.append(nm, x);
    el.addEventListener('click', () => activateTab(t));
    tabsEl.appendChild(el);
  }
  const act = tabsEl.querySelector('.tab.active');
  if (act) act.scrollIntoView({ inline: 'nearest', block: 'nearest' });
}

/* 탭 클릭(전환) 시: 디스크의 최신 내용과 버퍼가 다르면 재로딩 여부 확인 */
async function activateTab(t) {
  syncEditorToTab();
  activeTab = t;
  if (t.path) {
    const r = await window.pywebview.api.open_path(t.path);
    if (r && r.content !== t.content) {
      if (confirm('내용이 수정되어 다시 로딩 하시겠습니까?')) {
        t.content = r.content;
        t.dirty = false;
      } else {
        t.dirty = true; // 버퍼 유지 → 디스크와 다른 상태
      }
    } else if (r) {
      t.dirty = false;
    }
  } else {
    await window.pywebview.api.new_file();
  }
  showActiveTab();
}

/* 파일을 탭으로 열기 (열기 대화상자/디렉토리 패널 공용) */
async function openFileIntoTabs(r) {
  const existing = tabs.find(t => t.path === r.path);
  if (existing) { await activateTab(existing); return; }
  syncEditorToTab();
  const t = { path: r.path, name: baseName(r.path), content: r.content, dirty: false };
  tabs.push(t);
  activeTab = t;
  showActiveTab();
  editor.scrollTop = 0;
  flash('열기 완료');
}

async function closeTab(t) {
  if (t === activeTab) syncEditorToTab();
  if (t.dirty && !confirm('저장하지 않은 변경사항이 있습니다. 탭을 닫을까요?')) return;
  const idx = tabs.indexOf(t);
  tabs.splice(idx, 1);
  if (t === activeTab) {
    if (!tabs.length) { await doNew(); return; }
    await activateTab(tabs[Math.max(0, idx - 1)]);
  } else {
    renderTabs();
    saveSession();
  }
}

async function doNew() {
  syncEditorToTab();
  await window.pywebview.api.new_file();
  const t = { path: null, name: '새 문서', content: '', dirty: false };
  tabs.push(t);
  activeTab = t;
  showActiveTab();
}

async function doOpen() {
  const r = await window.pywebview.api.open_file();
  if (!r) return;
  await openFileIntoTabs(r);
}

async function doSave() {
  if (!activeTab) return;
  syncEditorToTab();
  const r = await window.pywebview.api.save_file(editor.value);
  if (!r) return;
  activeTab.path = r.path;
  activeTab.name = baseName(r.path);
  activeTab.dirty = false;
  currentPath = r.path;
  updatePath();
  renderTabs();
  markActiveFile();
  saveSession();
  flash('저장됨: ' + r.path);
}

/* 다른 이름으로 저장 */
async function doSaveAs() {
  if (!activeTab) return;
  syncEditorToTab();
  const d = await window.pywebview.api.save_as_dialog(activeTab.name === '새 문서' ? 'untitled.md' : activeTab.name);
  if (!d) return;
  await window.pywebview.api.save_to(d.path, activeTab.content);
  activeTab.path = d.path;
  activeTab.name = baseName(d.path);
  activeTab.dirty = false;
  currentPath = d.path;
  await window.pywebview.api.set_current(d.path);
  updatePath();
  renderTabs();
  markActiveFile();
  saveSession();
  flash('저장됨: ' + d.path);
}

/* 모두 저장: 열려있는 모든 탭을 현재 버퍼 기준으로 일괄 저장 */
async function doSaveAll() {
  /* 실수 방지: 반드시 확인을 받아야 진행 */
  if (!confirm('열려 있는 탭 ' + tabs.length + '개를 모두 저장할까요?')) return;
  syncEditorToTab();
  let saved = 0;
  for (const t of tabs) {
    if (t.path) {
      if (!t.dirty) continue; // 변경 없는 파일은 그대로
      await window.pywebview.api.save_to(t.path, t.content);
      t.dirty = false;
      saved++;
    } else {
      const d = await window.pywebview.api.save_as_dialog('untitled.md');
      if (!d) continue; // 취소하면 해당 탭은 건너뜀
      await window.pywebview.api.save_to(d.path, t.content);
      t.path = d.path;
      t.name = baseName(d.path);
      t.dirty = false;
      saved++;
    }
  }
  if (activeTab && activeTab.path) {
    currentPath = activeTab.path;
    await window.pywebview.api.set_current(activeTab.path);
  }
  updatePath();
  renderTabs();
  markActiveFile();
  flash('모두 저장 완료 (' + saved + '개)');
}

/* 모두 닫기: 변경사항 있는 파일마다 저장 여부를 확인하며 전체 닫기 */
async function doCloseAll() {
  /* 실수 방지: 반드시 확인을 받아야 진행 */
  if (!confirm('열려 있는 탭 ' + tabs.length + '개를 모두 닫을까요?')) return;
  syncEditorToTab();
  for (const t of [...tabs]) {
    if (t.dirty) {
      if (confirm('"' + t.name + '" 파일에 변경사항이 있습니다. 저장하고 닫을까요?\n(취소하면 저장하지 않고 닫습니다)')) {
        if (t.path) {
          await window.pywebview.api.save_to(t.path, t.content);
        } else {
          const d = await window.pywebview.api.save_as_dialog('untitled.md');
          if (d) await window.pywebview.api.save_to(d.path, t.content);
        }
      }
    }
    tabs.splice(tabs.indexOf(t), 1);
  }
  activeTab = null;
  await doNew(); // 빈 새 문서 탭 하나로 시작
}

document.getElementById('btn-saveas').addEventListener('click', doSaveAs);
document.getElementById('btn-saveall').addEventListener('click', doSaveAll);
document.getElementById('btn-closeall').addEventListener('click', doCloseAll);

/* 탭 바 좌우 이동 - 한 파일(탭)씩 스크롤 */
function scrollTabs(dir) {
  const children = [...tabsEl.children];
  if (!children.length) return;
  const sl = tabsEl.scrollLeft;
  if (dir > 0) {
    const next = children.find(c => c.offsetLeft > sl + 1);
    if (next) tabsEl.scrollTo({ left: next.offsetLeft });
  } else {
    const prev = [...children].reverse().find(c => c.offsetLeft < sl - 1);
    if (prev) tabsEl.scrollTo({ left: prev.offsetLeft });
  }
}
document.getElementById('tab-left').addEventListener('click', () => scrollTabs(-1));
document.getElementById('tab-right').addEventListener('click', () => scrollTabs(1));

/* ---------- 맨 위로 가기 ---------- */
document.getElementById('editor-top').addEventListener('click', () =>
  editor.scrollTo({ top: 0, behavior: 'smooth' }));
document.getElementById('preview-top').addEventListener('click', () =>
  previewScroll.scrollTo({ top: 0, behavior: 'smooth' }));

async function doExport() {
  const r = await window.pywebview.api.export_html(editor.value);
  if (!r) return;
  flash('HTML 저장됨: ' + r.path);
}

/* ---------- 설명서 (미리보기에 표시) ---------- */
const HELP_MD = `# 📖 jm-mdv (Markdown Viewer) 사용 설명서

**jm-mdv**는 마크다운을 작성하면서 결과를 실시간으로 확인할 수 있는 가벼운 데스크톱 에디터/뷰어입니다.
좌측 에디터에 입력하는 즉시 우측 미리보기에 반영되며, 여러 파일을 탭으로 열어 동시에 작업할 수 있습니다.

---

## 🧰 상단 툴바 버튼

| 버튼 | 기능 | 단축키 |
|------|------|--------|
| 📄 새 파일 | 빈 새 문서 탭을 만듭니다 | \`Ctrl+N\` |
| 🗂️ 디렉토리 | 좌측 폴더 탐색 패널을 열고 닫습니다 | - |
| 📂 열기 | 파일 열기 대화상자로 마크다운 파일을 엽니다 | \`Ctrl+O\` |
| 💾 저장 | 현재 문서를 저장합니다 (새 문서면 저장 위치를 물어봄) | \`Ctrl+S\` |
| 📝 다른 이름 | 현재 문서를 다른 이름/위치로 저장합니다 | \`Ctrl+Shift+S\` |
| 🗃️ 모두 저장 | 확인 창에서 확인을 눌러야 모든 탭의 변경사항을 일괄 저장합니다 | - |
| 🚪 모두 닫기 | 확인 창에서 확인을 눌러야 모든 탭을 닫습니다 (변경사항은 파일마다 저장 여부 확인) | - |
| 🔍 검색 | 에디터 검색 바를 엽니다 | \`Ctrl+F\` |
| 🌐 HTML 내보내기 | 미리보기 모습 그대로 단일 HTML 파일로 저장합니다 | - |
| ❓ 설명서 | 이 설명서를 모달 창으로 표시합니다 | - |

우측의 **파일 경로 표시줄**을 클릭하면 현재 파일 위치가 탐색기에서 열립니다.
파일명 앞의 <span style="color:#b45309">●</span> 표시는 **저장되지 않은 변경사항**이 있다는 뜻입니다.

## 🔍 검색 기능

- \`Ctrl+F\` 또는 툴바의 **🔍 검색** 버튼으로 검색 바를 엽니다.
- 입력하는 즉시 에디터의 모든 일치 위치가 **노란색으로 하이라이트**되고, 현재 위치는 주황색으로 표시됩니다.
- 우측 **미리보기 화면에도** 일치하는 단어가 노란색으로 함께 표시됩니다.
- 검색 바의 카운터(예: \`3/12\`)로 현재 위치/전체 개수를 확인할 수 있습니다.

| 조작 | 동작 |
|------|------|
| \`Enter\` / ▼ | 다음 결과로 이동 |
| \`Shift+Enter\` / ▲ | 이전 결과로 이동 |
| \`F3\` / \`Shift+F3\` | 검색 바가 닫혀 있어도 다음/이전 결과 이동 |
| \`Aa\` 버튼 | 대소문자 구분 켜기/끄기 |
| \`Esc\` / ✕ | 검색 바 닫기 (마지막 결과가 선택된 채 에디터로 복귀) |

에디터에서 단어를 선택한 뒤 \`Ctrl+F\`를 누르면 해당 단어가 자동으로 검색어에 입력됩니다.

> 💡 이 **설명서 모달이 열려 있을 때** \`Ctrl+F\`를 누르면 상단의 **설명서 검색창**이 활성화됩니다.
> 각 탭(프로그램 사용 설명 / 마크다운 사용법)별로 현재 보고 있는 내용이 검색되며,
> \`Enter\`/\`Shift+Enter\`로 다음/이전 결과로 이동합니다.

## 🗂️ 폴더 탐색 패널

- **🗂️ 디렉토리** 버튼으로 좌측 패널을 열면 드라이브/폴더를 탐색할 수 있습니다.
- 상단의 드라이브 칩(\`C:\` \`D:\` …)을 클릭해 드라이브를 바로 이동할 수 있습니다.
- 폴더는 **더블클릭**으로 이동, \`..\` 항목 더블클릭 또는 ⬆️ 버튼으로 상위 폴더 이동.
- 마크다운 파일(\`.md\` \`.markdown\` \`.mdown\` \`.txt\`)을 **더블클릭**하면 탭으로 열립니다.
- 패널 오른쪽 경계를 드래그하면 폭을 조절할 수 있습니다.

### 파일 관리 (우클릭 메뉴)

- 파일을 **우클릭**하면 메뉴가 나타납니다:
    - **✏️ 이름 변경**: 목록 안에서 바로 새 이름을 입력합니다 (\`Enter\` 확정, \`Esc\` 취소)
    - **🗑️ 삭제**: 확인 후 파일을 삭제합니다 (열려 있던 탭도 함께 닫힘)
    - **📄 새 파일**: 현재 폴더에 \`noname.md\`를 만듭니다 (이미 있으면 \`noname_1.md\`, \`noname_2.md\` … 순서로 자동 이름)
- 파일 목록의 **빈 곳을 우클릭**해도 새 파일을 만들 수 있습니다.

### 파일 이동 (드래그 앤 드롭)

- 파일을 **드래그**해서 폴더, \`..\`(상위 폴더), 상단 드라이브 칩 위에 놓으면 그 위치로 이동합니다.
- 대상 폴더에 같은 이름의 파일이 있으면 이동하지 않고 알려줍니다.
- 열려 있는 탭의 파일을 이동하면 탭 경로도 자동으로 갱신됩니다.

## 📑 파일 탭

- 여러 파일을 동시에 열어 탭으로 전환하며 편집합니다.
- 탭을 **드래그**하여 순서를 바꿀 수 있습니다.
- ◀ ▶ 버튼으로 탭 목록을 좌우로 스크롤합니다.
- 탭 전환 시 디스크의 파일이 밖에서 수정되었으면 다시 불러올지 물어봅니다.
- 열려 있던 탭 목록은 자동 저장되어 **다음 실행 때 그대로 복원**됩니다.

---

## ✏️ 에디터 / 👁️ 미리보기

- 입력 후 잠시 멈추면(0.1초) 자동으로 미리보기가 갱신됩니다.
- 에디터 상단에 현재 파일의 **최초 생성일 / 최근 수정일**이 \`년-월-일 시:분:초\` 형식으로 표시됩니다 (저장하면 수정일 갱신).
- **동기 스크롤**: 한쪽을 스크롤하면 반대쪽도 같은 비율로 따라갑니다.
- 가운데 구분선을 **드래그**하면 좌우 비율 조절, **더블클릭**하면 50:50으로 초기화됩니다.
- 각 패널의 **⛶ 전체보기** 버튼으로 에디터만/미리보기만 크게 볼 수 있습니다.
- \`Tab\` 키는 공백 4칸을 입력합니다.
- 우측 하단 ▲ 버튼으로 맨 위로 이동합니다.
- 하단 상태바에 커서 위치(줄:칸)와 글자 수가 표시됩니다.

## 📝 지원 마크다운 문법

기본 문법(제목, 목록, 인용, 링크, 이미지, 표, 코드 블록)에 더해 아래 확장 문법을 지원합니다.

- **코드 하이라이팅**: 코드 블록에 언어 이름(예: \`python\`, \`js\`)을 지정하면 구문 강조
- **작업 목록**: \`- [x] 완료\` / \`- [ ] 할 일\`
- ~~취소선~~ \`~~텍스트~~\`, ==하이라이트== \`==텍스트==\`, 윗첨자 \`^텍스트^\`, 아랫첨자 \`~텍스트~\`
- **각주**, **약어**, **정의 목록**, **Admonition**(주의/참고 상자)
- URL 자동 링크 (magiclink)

\`\`\`python
# 코드 블록 예시
def hello(name: str) -> str:
    return f"안녕하세요, {name}님!"
\`\`\`

> 💡 이 설명서는 **닫기** 버튼, 우측 상단 **✕**, 창 바깥 영역 클릭 또는 \`Esc\` 키로 닫을 수 있습니다.
`;

/* 마크다운 필수 문법 30선 (설명서 두 번째 탭) */
const MD_GUIDE = `# 📝 마크다운 필수 문법 30선

마크다운 문서 작성에 가장 많이 쓰이는 핵심 문법 30가지를 정리했습니다.
각 항목의 **문법**을 에디터에 그대로 입력하면 **결과**처럼 렌더링됩니다.

## 1. 제목 (Heading)

\`#\` 개수로 제목 수준(1~6단계)을 지정합니다. \`#\` 뒤에 반드시 공백이 있어야 합니다.
문서의 구조를 잡는 가장 기본 문법으로, 1단계는 문서 제목, 2~3단계는 장/절 제목에 사용합니다.

**문법**
\`\`\`markdown
# 제목 1단계
## 제목 2단계
### 제목 3단계
###### 제목 6단계
\`\`\`

**결과** (3, 6단계 예시)

### 제목 3단계
###### 제목 6단계

---

## 2. 문단과 줄바꿈

빈 줄로 구분하면 **새 문단**이 됩니다. 같은 문단 안에서 줄만 바꾸려면
줄 끝에 **공백 2칸**을 넣거나 \`<br>\` 태그를 사용합니다. (그냥 Enter 한 번은 이어 붙습니다)

**문법**
\`\`\`markdown
첫 번째 문단입니다.

두 번째 문단입니다.
줄 끝에 공백 2칸을 넣으면
줄바꿈이 됩니다.
\`\`\`

**결과**

첫 번째 문단입니다.

두 번째 문단입니다.
줄 끝에 공백 2칸을 넣으면
줄바꿈이 됩니다.

---

## 3. 굵게 (Bold)

강조할 텍스트를 \`**\` 또는 \`__\`로 감쌉니다.

**문법**
\`\`\`markdown
이것은 **굵은 글씨** 입니다.
\`\`\`

**결과**

이것은 **굵은 글씨** 입니다.

---

## 4. 기울임 (Italic)

텍스트를 \`*\` 또는 \`_\`로 감쌉니다.

**문법**
\`\`\`markdown
이것은 *기울임 글씨* 입니다.
\`\`\`

**결과**

이것은 *기울임 글씨* 입니다.

---

## 5. 굵게 + 기울임

\`***\`로 감싸면 굵게와 기울임이 동시에 적용됩니다.

**문법**
\`\`\`markdown
이것은 ***굵은 기울임*** 입니다.
\`\`\`

**결과**

이것은 ***굵은 기울임*** 입니다.

---

## 6. 취소선 (Strikethrough)

\`~~\`로 감싸면 취소선이 그어집니다. 변경 전 내용을 남겨둘 때 유용합니다.

**문법**
\`\`\`markdown
가격은 ~~10,000원~~ 8,000원입니다.
\`\`\`

**결과**

가격은 ~~10,000원~~ 8,000원입니다.

---

## 7. 하이라이트 (Mark)

\`==\`로 감싸면 형광펜 효과가 적용됩니다. (pymdownx.mark 확장)

**문법**
\`\`\`markdown
이 부분이 ==가장 중요== 합니다.
\`\`\`

**결과**

이 부분이 ==가장 중요== 합니다.

---

## 8. 윗첨자 (Superscript)

\`^\`로 감싸면 윗첨자가 됩니다. 수식·단위 표기에 사용합니다. (pymdownx.caret 확장)

**문법**
\`\`\`markdown
넓이는 10m^2^ 입니다.
\`\`\`

**결과**

넓이는 10m^2^ 입니다.

---

## 9. 아랫첨자 (Subscript)

\`~\`로 감싸면 아랫첨자가 됩니다. 화학식 표기 등에 사용합니다. (pymdownx.tilde 확장)

**문법**
\`\`\`markdown
물의 분자식은 H~2~O 입니다.
\`\`\`

**결과**

물의 분자식은 H~2~O 입니다.

---

## 10. 인라인 코드 (Inline Code)

문장 안의 코드나 명령어를 **백틱**(\\\`)으로 감쌉니다.

**문법**
\`\`\`markdown
터미널에서 \`pip install markdown\` 을 실행하세요.
\`\`\`

**결과**

터미널에서 \`pip install markdown\` 을 실행하세요.

---

## 11. 코드 블록 (Code Block)

백틱 3개(\\\`\\\`\\\`)로 감싸면 여러 줄 코드 블록이 됩니다.
여는 백틱 뒤에 **언어 이름**을 쓰면 구문 강조(하이라이팅)가 적용됩니다.

**문법**
\`\`\`\`markdown
\`\`\`python
def hello(name):
    return f"안녕, {name}!"
\`\`\`
\`\`\`\`

**결과**

\`\`\`python
def hello(name):
    return f"안녕, {name}!"
\`\`\`

---

## 12. 순서 없는 목록 (Unordered List)

\`-\`, \`*\`, \`+\` 중 하나로 시작하면 글머리 기호 목록이 됩니다.

**문법**
\`\`\`markdown
- 사과
- 바나나
- 딸기
\`\`\`

**결과**

- 사과
- 바나나
- 딸기

---

## 13. 순서 있는 목록 (Ordered List)

\`숫자.\`으로 시작하면 번호 목록이 됩니다. 번호를 잘못 써도 자동으로 순서가 매겨집니다.

**문법**
\`\`\`markdown
1. 재료 준비
2. 반죽 만들기
3. 굽기
\`\`\`

**결과**

1. 재료 준비
2. 반죽 만들기
3. 굽기

---

## 14. 중첩 목록 (Nested List)

하위 항목을 **공백 4칸**으로 들여쓰면 계층 구조가 됩니다.

**문법**
\`\`\`markdown
- 과일
    - 사과
    - 배
- 채소
    1. 당근
    2. 오이
\`\`\`

**결과**

- 과일
    - 사과
    - 배
- 채소
    1. 당근
    2. 오이

---

## 15. 작업 목록 (Task List)

\`- [ ]\`는 미완료, \`- [x]\`는 완료된 체크박스 항목이 됩니다. 할 일 관리에 유용합니다.

**문법**
\`\`\`markdown
- [x] 기획서 작성
- [ ] 디자인 시안
- [ ] 개발
\`\`\`

**결과**

- [x] 기획서 작성
- [ ] 디자인 시안
- [ ] 개발

---

## 16. 인용문 (Blockquote)

\`>\`로 시작하면 인용 상자가 됩니다. 다른 사람의 말이나 강조하고 싶은 문구에 사용합니다.

**문법**
\`\`\`markdown
> 성공은 준비된 자에게 온다.
\`\`\`

**결과**

> 성공은 준비된 자에게 온다.

---

## 17. 중첩 인용문

\`>>\`처럼 겹쳐 쓰면 인용 안의 인용을 표현합니다.

**문법**
\`\`\`markdown
> 원래 글
>> 그 글에 대한 답글
\`\`\`

**결과**

> 원래 글
>> 그 글에 대한 답글

## 18. 링크 (Link)

\`[표시할 텍스트](주소)\` 형식입니다. 소괄호 안에 \`"제목"\`을 추가하면 마우스 오버 시 툴팁이 표시됩니다.

**문법**
\`\`\`markdown
[구글](https://google.com)
[네이버](https://naver.com "네이버로 이동")
\`\`\`

**결과**

[구글](https://google.com)
[네이버](https://naver.com "네이버로 이동")

## 19. 자동 링크 (Auto Link)

URL을 그대로 쓰면 자동으로 링크가 됩니다. (pymdownx.magiclink 확장)

**문법**
\`\`\`markdown
자세한 내용은 https://github.com 참고
\`\`\`

**결과**

자세한 내용은 https://github.com 참고

링크 앞에 \`!\`를 붙이면 이미지가 삽입됩니다. 대체 텍스트는 이미지를 못 불러올 때 표시됩니다.

**문법**
\`\`\`markdown
![대체 텍스트](이미지 경로 또는 URL)
![로고](images/logo.png)

**문법**
\`\`\`markdown
| 이름 | 나이 | 직업 |
|------|------|------|
| 홍길동 | 30 | 개발자 |
| 김영희 | 25 | 디자이너 |
\`\`\`

**결과**

| 이름 | 나이 | 직업 |
|------|------|------|
| 홍길동 | 30 | 개발자 |
| 김영희 | 25 | 디자이너 |

## 22. 표 정렬 (Table Alignment)

구분선에 콜론(\`:\`)을 붙여 열 정렬을 지정합니다. \`:---\` 왼쪽, \`:---:\` 가운데, \`---:\` 오른쪽 정렬입니다.

**문법**
\`\`\`markdown
| 왼쪽 | 가운데 | 오른쪽 |
|:-----|:------:|-------:|
| a | b | c |
| 항목1 | 항목2 | 항목3 |

> 💡 위 문법들을 좌측 에디터에 직접 입력해 보면서 우측 미리보기로 바로 확인해 보세요!
`;

const helpOverlay = document.getElementById('help-overlay');
const helpModal = document.getElementById('help-modal');
const helpHeader = document.getElementById('help-header');
const helpContent = document.getElementById('help-content');
const helpContentMd = document.getElementById('help-content-md');
const helpBody = document.getElementById('help-body');
const helpTopBtn = document.getElementById('help-top');
let helpLoaded = false;
let helpMdLoaded = false;

async function openHelp() {
  if (!helpLoaded) {
    try {
      const r = await window.pywebview.api.render(HELP_MD);
      helpContent.innerHTML = r.html;
      helpLoaded = true;
    } catch (e) { return; /* API 준비 전 무시 */ }
  }
  helpOverlay.classList.add('open');
  helpBody.scrollTop = 0;
}

function closeHelp() { helpOverlay.classList.remove('open'); }

/* 탭 전환: 프로그램 사용 설명 / 마크다운 사용법 */
async function switchHelpTab(tab) {
  document.querySelectorAll('.help-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  helpContent.style.display = tab === 'app' ? '' : 'none';
  helpContentMd.style.display = tab === 'md' ? '' : 'none';
  helpBody.scrollTop = 0;
  helpTopBtn.classList.remove('show');
  if (tab === 'md' && !helpMdLoaded) {
    try {
      const r = await window.pywebview.api.render(MD_GUIDE);
      helpContentMd.innerHTML = r.html;
      helpMdLoaded = true;
    } catch (e) { /* API 준비 전 무시 */ }
  }
  runHelpSearch(); // 탭이 바뀌면 현재 탭 내용 기준으로 검색 다시 적용
}

document.querySelectorAll('.help-tab').forEach(b =>
  b.addEventListener('click', () => switchHelpTab(b.dataset.tab)));

/* ---------- 설명서 내 검색 (탭별로 현재 보이는 내용을 검색) ---------- */
const helpSearchInput = document.getElementById('help-search-input');
const helpSearchCount = document.getElementById('help-search-count');
let helpMatches = [];   // 현재 탭의 <mark> 요소 목록
let helpMatchIdx = -1;

function activeHelpArticle() {
  return helpContentMd.style.display === 'none' ? helpContent : helpContentMd;
}

function clearHelpHighlights() {
  helpBody.querySelectorAll('mark.help-hl').forEach(mk => {
    const p = mk.parentNode;
    p.replaceChild(document.createTextNode(mk.textContent), mk);
    p.normalize();
  });
  helpMatches = [];
  helpMatchIdx = -1;
}

function updateHelpCount() {
  helpSearchCount.textContent = helpSearchInput.value
    ? (helpMatches.length ? (helpMatchIdx + 1) + '/' + helpMatches.length : '0/0') : '';
}

function runHelpSearch() {
  clearHelpHighlights();
  const q = helpSearchInput.value;
  if (!q) { updateHelpCount(); return; }
  const root = activeHelpArticle();
  const needle = q.toLowerCase();
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const targets = [];
  let node;
  while ((node = walker.nextNode())) {
    if (node.nodeValue.toLowerCase().includes(needle)) targets.push(node);
  }
  for (const tn of targets) {
    const text = tn.nodeValue;
    const hay = text.toLowerCase();
    const frag = document.createDocumentFragment();
    let last = 0, i = hay.indexOf(needle);
    while (i !== -1) {
      frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mk = document.createElement('mark');
      mk.className = 'help-hl';
      mk.textContent = text.slice(i, i + needle.length);
      frag.appendChild(mk);
      last = i + needle.length;
      i = hay.indexOf(needle, last);
    }
    frag.appendChild(document.createTextNode(text.slice(last)));
    tn.parentNode.replaceChild(frag, tn);
  }
  helpMatches = [...root.querySelectorAll('mark.help-hl')];
  if (helpMatches.length) gotoHelpMatch(1); // 첫 결과로 이동
  else updateHelpCount();
}

function gotoHelpMatch(dir) {
  if (!helpMatches.length) return;
  if (helpMatchIdx >= 0) helpMatches[helpMatchIdx].classList.remove('current');
  helpMatchIdx = (helpMatchIdx + dir + helpMatches.length) % helpMatches.length;
  const cur = helpMatches[helpMatchIdx];
  cur.classList.add('current');
  cur.scrollIntoView({ block: 'center' });
  updateHelpCount();
}

helpSearchInput.addEventListener('input', runHelpSearch);
helpSearchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); gotoHelpMatch(e.shiftKey ? -1 : 1); }
  else if (e.key === 'Escape' && helpSearchInput.value) {
    /* 검색어가 있으면 Esc는 검색만 지움 (모달 닫힘 방지), 비어 있으면 모달 닫기로 전달 */
    e.stopPropagation();
    helpSearchInput.value = '';
    runHelpSearch();
  }
});
document.getElementById('help-search-next').addEventListener('click', () => gotoHelpMatch(1));
document.getElementById('help-search-prev').addEventListener('click', () => gotoHelpMatch(-1));

/* 타이틀 바 드래그로 모달 이동 */
helpHeader.addEventListener('mousedown', (e) => {
  if (e.target.closest('button, #help-search')) return; // 탭/닫기/검색창은 드래그 제외
  e.preventDefault();
  const rect = helpModal.getBoundingClientRect();
  const dx = e.clientX - rect.left;
  const dy = e.clientY - rect.top;
  const move = (ev) => {
    helpModal.style.position = 'fixed';
    /* 타이틀 바가 화면 밖으로 완전히 나가지 않도록 제한 */
    const x = Math.max(80 - rect.width, Math.min(innerWidth - 80, ev.clientX - dx));
    const y = Math.max(0, Math.min(innerHeight - 40, ev.clientY - dy));
    helpModal.style.left = x + 'px';
    helpModal.style.top = y + 'px';
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
});

/* 스크롤 내리면 '맨 위로' 버튼 표시 */
helpBody.addEventListener('scroll', () =>
  helpTopBtn.classList.toggle('show', helpBody.scrollTop > 250));
helpTopBtn.addEventListener('click', () =>
  helpBody.scrollTo({ top: 0, behavior: 'smooth' }));

document.getElementById('btn-help').addEventListener('click', openHelp);
document.getElementById('help-x').addEventListener('click', closeHelp);
document.getElementById('help-close-btn').addEventListener('click', closeHelp);
/* 모달 바깥(어두운 영역) 클릭 시 닫기 */
helpOverlay.addEventListener('click', (e) => { if (e.target === helpOverlay) closeHelp(); });

document.getElementById('btn-new').addEventListener('click', doNew);
document.getElementById('btn-open').addEventListener('click', doOpen);
document.getElementById('btn-save').addEventListener('click', doSave);
document.getElementById('btn-export').addEventListener('click', doExport);

/* ---------- 폴더 탐색 패널 ---------- */
const sidebar = document.getElementById('sidebar');
const sbList = document.getElementById('sb-list');
const sbPath = document.getElementById('sb-path');
const sbUp = document.getElementById('sb-up');
let sidebarDir = null;    // 마지막으로 탐색한 위치 (닫았다 열어도 유지)
let sidebarParent = null;

const sbDrives = document.getElementById('sb-drives');

async function loadDir(path) {
  const r = await window.pywebview.api.list_dir(path || null);
  if (!r) return;
  sidebarDir = r.path;
  sidebarParent = r.parent;
  sbPath.textContent = r.name;
  sbPath.title = r.path === '::drives' ? '내 PC' : r.path;
  sbUp.style.visibility = r.parent ? 'visible' : 'hidden';

  // 드라이브(디스크) 바 - 항상 표시 (현재 위치가 속한 드라이브 = 가장 긴 경로 매칭)
  sbDrives.innerHTML = '';
  const drv = r.drives || [];
  let activeDrive = null;
  if (r.path !== '::drives') {
    const up = r.path.toUpperCase();
    for (const d of drv) {
      const base = d.path.toUpperCase().replace(/[\\/]+$/, '');
      if (up === base || up.startsWith(base + '\\') || up.startsWith(base + '/') || d.path === '/') {
        if (!activeDrive || d.path.length > activeDrive.path.length) activeDrive = d;
      }
    }
  }
  for (const d of drv) {
    const chip = document.createElement('div');
    chip.className = 'sb-drive' + (d === activeDrive ? ' active' : '');
    chip.textContent = d.label;
    chip.title = d.path + ' 로 이동';
    chip.addEventListener('click', () => loadDir(d.path));
    addDropTarget(chip, d.path);
    sbDrives.appendChild(chip);
  }

  sbList.innerHTML = '';

  // ".." = 상위(이전) 폴더로 이동 (더블클릭)
  if (r.parent) {
    const up = makeItem('📁', '..');
    up.title = '더블클릭: 상위 폴더로 이동';
    up.addEventListener('dblclick', () => loadDir(r.parent));
    if (r.parent !== '::drives') addDropTarget(up, r.parent);
    sbList.appendChild(up);
  }
  for (const d of r.dirs) {
    const el = makeItem('📁', d.name);
    el.title = '더블클릭: 폴더 열기';
    el.addEventListener('dblclick', () => loadDir(d.path));
    addDropTarget(el, d.path);
    sbList.appendChild(el);
  }
  for (const f of r.files) {
    const el = makeItem('📄', f.name);
    el.classList.add('file');
    el.dataset.path = f.path;
    el.addEventListener('dblclick', async () => {
      const opened = await window.pywebview.api.open_path(f.path);
      if (opened) await openFileIntoTabs(opened);
    });
    /* 드래그로 다른 폴더에 이동 */
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      dragFile = f.path;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', f.path);
    });
    el.addEventListener('dragend', () => { dragFile = null; });
    /* 우클릭 메뉴: 이름 변경 / 삭제 / 새 파일 */
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      showCtxMenu(e.clientX, e.clientY, [
        { label: '✏️ 이름 변경', action: () => startRename(el, f) },
        { label: '🗑️ 삭제', danger: true, action: () => deleteFile(f) },
        { label: '📄 새 파일', action: createNewFile },
      ]);
    });
    sbList.appendChild(el);
  }
  if (!r.dirs.length && !r.files.length) {
    const empty = document.createElement('div');
    empty.className = 'sb-empty';
    empty.textContent = '표시할 폴더/마크다운 파일이 없습니다';
    sbList.appendChild(empty);
  }
  markActiveFile();
}

function makeItem(icon, name) {
  const el = document.createElement('div');
  el.className = 'sb-item';
  const i = document.createElement('span');
  i.textContent = icon;
  const n = document.createElement('span');
  n.textContent = name;
  n.title = name;
  el.append(i, n);
  return el;
}

function markActiveFile() {
  sbList.querySelectorAll('.sb-item.file').forEach(el =>
    el.classList.toggle('active', el.dataset.path === currentPath));
}

/* ---------- 우클릭 컨텍스트 메뉴 ---------- */
const ctxMenu = document.getElementById('ctx-menu');

function showCtxMenu(x, y, items) {
  ctxMenu.innerHTML = '';
  for (const it of items) {
    const el = document.createElement('div');
    el.className = 'ctx-item' + (it.danger ? ' danger' : '');
    el.textContent = it.label;
    el.addEventListener('click', () => { hideCtxMenu(); it.action(); });
    ctxMenu.appendChild(el);
  }
  ctxMenu.style.display = 'block';
  const rect = ctxMenu.getBoundingClientRect();
  ctxMenu.style.left = Math.max(0, Math.min(x, innerWidth - rect.width - 4)) + 'px';
  ctxMenu.style.top = Math.max(0, Math.min(y, innerHeight - rect.height - 4)) + 'px';
}

function hideCtxMenu() { ctxMenu.style.display = 'none'; }

/* 메뉴 바깥을 누르면 닫기 (좌/우클릭 공통) */
document.addEventListener('mousedown', (e) => {
  if (!ctxMenu.contains(e.target)) hideCtxMenu();
});

/* 파일 목록 빈 곳 우클릭 → 새 파일 */
sbList.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  showCtxMenu(e.clientX, e.clientY, [
    { label: '📄 새 파일', action: createNewFile },
  ]);
});

/* ---------- 파일 관리 (새 파일 / 이름 변경 / 삭제 / 이동) ---------- */
let dragFile = null; // 드래그 중인 파일 경로

/* 폴더/드라이브 요소를 파일 드롭 대상으로 등록 */
function addDropTarget(el, dirPath) {
  el.addEventListener('dragover', (e) => {
    if (!dragFile) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    el.classList.add('drop-target');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drop-target'));
  el.addEventListener('drop', async (e) => {
    e.preventDefault();
    el.classList.remove('drop-target');
    if (!dragFile) return;
    const src = dragFile;
    dragFile = null;
    const r = await window.pywebview.api.move_path(src, dirPath);
    if (!r || r.error) { flash('이동 실패: ' + (r ? r.error : '알 수 없는 오류')); return; }
    /* 열려 있는 탭이면 새 경로로 갱신 */
    const t = tabs.find(t => t.path === src);
    if (t) {
      t.path = r.path;
      if (t === activeTab) { currentPath = r.path; updatePath(); }
      renderTabs();
      saveSession();
    }
    flash('이동 완료: ' + r.path);
    loadDir(sidebarDir);
  });
}

async function createNewFile() {
  if (!sidebarDir || sidebarDir === '::drives') { flash('폴더를 연 상태에서만 새 파일을 만들 수 있습니다'); return; }
  const r = await window.pywebview.api.create_file(sidebarDir);
  if (!r || r.error) { flash('생성 실패: ' + (r ? r.error : '알 수 없는 오류')); return; }
  await loadDir(sidebarDir);
  const opened = await window.pywebview.api.open_path(r.path);
  if (opened) await openFileIntoTabs(opened);
  flash('새 파일 생성: ' + r.name);
}

/* 이름 변경: 목록 항목 안에서 인라인 입력 */
function startRename(el, f) {
  const nameSpan = el.children[1];
  const input = document.createElement('input');
  input.className = 'sb-rename';
  input.value = f.name;
  nameSpan.style.display = 'none';
  el.draggable = false; // 입력 중 드래그 방지
  el.insertBefore(input, nameSpan);
  input.focus();
  const dot = f.name.lastIndexOf('.');
  input.setSelectionRange(0, dot > 0 ? dot : f.name.length);

  let done = false;
  const finish = async (commit) => {
    if (done) return;
    done = true;
    const newName = input.value.trim();
    input.remove();
    nameSpan.style.display = '';
    el.draggable = true;
    if (!commit || !newName || newName === f.name) return;
    const r = await window.pywebview.api.rename_path(f.path, newName);
    if (!r || r.error) { flash('이름 변경 실패: ' + (r ? r.error : '알 수 없는 오류')); return; }
    const t = tabs.find(t => t.path === f.path);
    if (t) {
      t.path = r.path;
      t.name = r.name;
      if (t === activeTab) { currentPath = r.path; updatePath(); }
      renderTabs();
      saveSession();
    }
    flash('이름 변경 완료: ' + r.name);
    loadDir(sidebarDir);
  };
  input.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') finish(true);
    else if (e.key === 'Escape') finish(false);
  });
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('click', (e) => e.stopPropagation());
  input.addEventListener('dblclick', (e) => e.stopPropagation());
  input.addEventListener('mousedown', (e) => e.stopPropagation());
}

async function deleteFile(f) {
  if (!confirm('"' + f.name + '" 파일을 삭제할까요?\n(휴지통을 거치지 않고 바로 삭제됩니다)')) return;
  const r = await window.pywebview.api.delete_path(f.path);
  if (!r || r.error) { flash('삭제 실패: ' + (r ? r.error : '알 수 없는 오류')); return; }
  /* 열려 있는 탭이면 닫기 (버퍼도 함께 정리) */
  const t = tabs.find(t => t.path === f.path);
  if (t) {
    t.dirty = false; // 파일 자체를 지웠으므로 저장 여부 확인 없이 닫음
    await closeTab(t);
  }
  flash('삭제 완료: ' + f.name);
  loadDir(sidebarDir);
}

let sbWidth = 280; // 사용자가 조절한 패널 너비 기억

/* 디렉토리 패널 너비 조절 */

/* ---------- 검색 (Ctrl+F) ---------- */
const searchBar = document.getElementById('search-bar');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const searchCaseBtn = document.getElementById('search-case');
const backdrop = document.getElementById('editor-backdrop');
const highlightsEl = document.getElementById('editor-highlights');

let matches = [];      // 매치 시작 위치 목록
let matchIdx = -1;     // 현재 매치 인덱스
let caseSensitive = false;

function searchOpen() { return searchBar.classList.contains('open'); }

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* textarea 뒤 레이어에 매치 위치를 <mark>로 그림 */
function renderHighlights() {
  if (!searchOpen() || !matches.length) { highlightsEl.innerHTML = ''; return; }
  const text = editor.value;
  const qlen = searchInput.value.length;
  let html = '', last = 0;
  matches.forEach((m, i) => {
    html += escHtml(text.slice(last, m));
    html += '<mark' + (i === matchIdx ? ' class="current"' : '') + '>'
      + escHtml(text.slice(m, m + qlen)) + '</mark>';
    last = m + qlen;
  });
  html += escHtml(text.slice(last));
  highlightsEl.innerHTML = html;
  backdrop.scrollTop = editor.scrollTop;
}

/* 프리뷰의 검색 하이라이트 제거 (텍스트 노드 원상 복구) */
let previewMarks = []; // 프리뷰의 <mark> 목록 (에디터 매치 순서와 대응)

function clearPreviewHighlights() {
  preview.querySelectorAll('mark.search-hl').forEach(mk => {
    const parent = mk.parentNode;
    parent.replaceChild(document.createTextNode(mk.textContent), mk);
    parent.normalize();
  });
  previewMarks = [];
}

/* 프리뷰에서 현재 검색 위치 강조 + (scroll=true면) 화면 중앙으로 이동
   에디터 n번째 매치 ≈ 프리뷰 n번째 매치로 대응 (마크다운 기호 안 매치는 어긋날 수 있음) */
function updatePreviewCurrent(scroll) {
  previewMarks.forEach(mk => mk.classList.remove('current'));
  if (matchIdx < 0 || !previewMarks.length) return;
  const cur = previewMarks[Math.min(matchIdx, previewMarks.length - 1)];
  cur.classList.add('current');
  if (scroll) {
    const top = cur.getBoundingClientRect().top - previewScroll.getBoundingClientRect().top
      + previewScroll.scrollTop - previewScroll.clientHeight / 2;
    previewScroll.scrollTop = Math.max(0, top);
  }
}

/* 프리뷰(렌더링된 HTML)의 텍스트 노드에서 검색어를 찾아 <mark>로 감쌈
   (요소 경계를 걸치는 매치는 표시되지 않음 - 예: 굵게 처리된 글자 일부) */
function highlightPreview() {
  clearPreviewHighlights();
  if (!searchOpen()) return;
  const q = searchInput.value;
  if (!q) return;
  const needle = caseSensitive ? q : q.toLowerCase();
  const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT, null);
  const targets = [];
  let node;
  while ((node = walker.nextNode())) {
    const hay = caseSensitive ? node.nodeValue : node.nodeValue.toLowerCase();
    if (hay.includes(needle)) targets.push(node);
  }
  for (const tn of targets) {
    const text = tn.nodeValue;
    const hay = caseSensitive ? text : text.toLowerCase();
    const frag = document.createDocumentFragment();
    let last = 0, i = hay.indexOf(needle);
    while (i !== -1) {
      frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mk = document.createElement('mark');
      mk.className = 'search-hl';
      mk.textContent = text.slice(i, i + needle.length);
      frag.appendChild(mk);
      last = i + needle.length;
      i = hay.indexOf(needle, last);
    }
    frag.appendChild(document.createTextNode(text.slice(last)));
    tn.parentNode.replaceChild(frag, tn);
  }
  previewMarks = [...preview.querySelectorAll('mark.search-hl')];
  updatePreviewCurrent(false);
}

function updateSearchUI(scroll) {
  renderHighlights();
  highlightPreview();
  searchCount.textContent = searchInput.value
    ? (matches.length ? (matchIdx + 1) + '/' + matches.length : '0/0') : '';
  if (scroll && matchIdx >= 0) {
    /* 동기 스크롤이 검색 위치 이동을 덮어쓰지 않도록 잠시 잠금 */
    scrollSource = 'search';
    const cur = highlightsEl.querySelector('mark.current');
    if (cur) {
      editor.scrollTop = Math.max(0, cur.offsetTop - editor.clientHeight / 2);
      backdrop.scrollTop = editor.scrollTop;
    }
    updatePreviewCurrent(true); // 프리뷰도 현재 위치를 화면 중앙으로
    clearTimeout(scrollResetTimer);
    scrollResetTimer = setTimeout(() => scrollSource = null, 160);
    const m = matches[matchIdx];
    editor.setSelectionRange(m, m + searchInput.value.length);
    updateStats();
  }
}

/* jump=true → 커서 이후 첫 매치로 이동, false → 위치 유지(내용 변경 시 갱신용) */
function runSearch(jump) {
  const q = searchInput.value;
  matches = [];
  if (q) {
    const hay = caseSensitive ? editor.value : editor.value.toLowerCase();
    const needle = caseSensitive ? q : q.toLowerCase();
    let i = hay.indexOf(needle);
    while (i !== -1) { matches.push(i); i = hay.indexOf(needle, i + needle.length); }
  }
  if (!matches.length) {
    matchIdx = -1;
    updateSearchUI(false);
  } else if (jump) {
    const cur = editor.selectionStart;
    matchIdx = matches.findIndex(m => m >= cur);
    if (matchIdx === -1) matchIdx = 0;
    updateSearchUI(true);
  } else {
    matchIdx = Math.min(Math.max(matchIdx, 0), matches.length - 1);
    updateSearchUI(false);
  }
}

function gotoMatch(dir) {
  if (!matches.length) return;
  matchIdx = (matchIdx + dir + matches.length) % matches.length;
  updateSearchUI(true);
}

function openSearch() {
  const sel = editor.value.slice(editor.selectionStart, editor.selectionEnd);
  searchBar.classList.add('open');
  if (sel && !sel.includes('\n')) searchInput.value = sel;
  searchInput.focus();
  searchInput.select();
  runSearch(true);
}

function closeSearch() {
  searchBar.classList.remove('open');
  renderHighlights();        // 에디터 하이라이트 제거
  clearPreviewHighlights();  // 프리뷰 하이라이트 제거
  editor.focus();            // 마지막 매치가 선택된 상태로 에디터 복귀
}

/* 검색 중 내용이 바뀌면(타이핑/탭 전환) 하이라이트 갱신 */
function refreshSearch() {
  if (searchOpen()) runSearch(false);
}

document.getElementById('btn-search').addEventListener('click', () =>
  searchOpen() ? closeSearch() : openSearch());
document.getElementById('search-next').addEventListener('click', () => gotoMatch(1));
document.getElementById('search-prev').addEventListener('click', () => gotoMatch(-1));
document.getElementById('search-close').addEventListener('click', closeSearch);
searchCaseBtn.addEventListener('click', () => {
  caseSensitive = !caseSensitive;
  searchCaseBtn.classList.toggle('active', caseSensitive);
  runSearch(true);
  searchInput.focus();
});
searchInput.addEventListener('input', () => runSearch(true));
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); gotoMatch(e.shiftKey ? -1 : 1); }
});

/* 하이라이트 레이어를 textarea 스크롤/크기와 동기화 */
editor.addEventListener('scroll', () => { backdrop.scrollTop = editor.scrollTop; });
new ResizeObserver(() => {
  highlightsEl.style.width = editor.clientWidth + 'px';
  backdrop.scrollTop = editor.scrollTop;
}).observe(editor);

/* 단축키 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && ctxMenu.style.display === 'block') { hideCtxMenu(); return; }
  if (e.key === 'Escape' && helpOverlay.classList.contains('open')) { closeHelp(); return; }
  if (e.key === 'Escape' && searchOpen()) { closeSearch(); return; }
  if (e.key === 'F3') {
    e.preventDefault();
    if (searchOpen()) gotoMatch(e.shiftKey ? -1 : 1);
    else openSearch();
    return;
  }
  if (!e.ctrlKey) return;
  const k = e.key.toLowerCase();
  if (k === 's' && e.shiftKey) { e.preventDefault(); doSaveAs(); }
  else if (k === 's') { e.preventDefault(); doSave(); }
  else if (k === 'o') { e.preventDefault(); doOpen(); }
  else if (k === 'n') { e.preventDefault(); doNew(); }
  else if (k === 'f') {
    e.preventDefault();
    if (helpOverlay.classList.contains('open')) {
      /* 설명서 모달이 열려 있으면 설명서 검색창에 커서 활성화 */
      helpSearchInput.focus();
      helpSearchInput.select();
    } else {
      openSearch();
    }
  }
});

/* ---------- 전체보기 토글 ---------- */
const mainEl = document.getElementById('main');
const btnFullEditor = document.getElementById('btn-full-editor');
const btnFullPreview = document.getElementById('btn-full-preview');

function updateFullButtons() {
  btnFullEditor.textContent = mainEl.classList.contains('full-editor') ? '◫ 분할보기' : '⛶ 전체보기';
  btnFullPreview.textContent = mainEl.classList.contains('full-preview') ? '◫ 분할보기' : '⛶ 전체보기';
}
btnFullEditor.addEventListener('click', () => {
  mainEl.classList.remove('full-preview');
  mainEl.classList.toggle('full-editor');
  updateFullButtons();
});
btnFullPreview.addEventListener('click', () => {
  mainEl.classList.remove('full-editor');
  mainEl.classList.toggle('full-preview');
  updateFullButtons();
});

/* ---------- 분할 크기 조절 ---------- */
const divider = document.getElementById('divider');
const editorPane = document.getElementById('editor-pane');
/* 더블클릭 → 좌우 정중앙(50:50)으로 리셋 */
divider.addEventListener('dblclick', () => { editorPane.style.flex = ''; });

divider.addEventListener('mousedown', (e) => {
  e.preventDefault();
  const move = (ev) => {
    const rect = mainEl.getBoundingClientRect();
    // 사이드바가 열려 있으면 그 폭을 제외한 영역 기준으로 계산 (유격 버그 방지)
    const sbW = sidebar.getBoundingClientRect().width;
    const avail = rect.width - sbW - divider.offsetWidth;
    let px = ev.clientX - rect.left - sbW;
    px = Math.max(avail * 0.15, Math.min(avail * 0.85, px));
    editorPane.style.flex = '0 0 ' + px + 'px';
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
});

/* ---------- 시작 ---------- */
window.addEventListener('pywebviewready', async () => {
  // 코드 하이라이트(pygments) CSS 주입
  const css = await window.pywebview.api.get_pygments_css();
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);

  // 이전 세션(열려 있던 파일들) 복원
  try {
    const sess = await window.pywebview.api.load_session();
    if (sess && sess.files && sess.files.length) {
      for (const p of sess.files) {
        const r = await window.pywebview.api.open_path(p);
        if (r) tabs.push({ path: r.path, name: baseName(r.path), content: r.content, dirty: false });
      }
      if (tabs.length) {
        activeTab = tabs[sess.active] || tabs[0];
        await window.pywebview.api.set_current(activeTab.path);
      }
    }
  } catch (e) { /* 세션 복원 실패 시 새 문서로 시작 */ }

  if (!tabs.length) {
    const first = { path: null, name: '새 문서', content: SAMPLE, dirty: false };
    tabs.push(first);
    activeTab = first;
  }
  showActiveTab();
});
</script>
