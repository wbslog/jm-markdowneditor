<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>jm-mdv(Markdown Viewer)</title>
<link rel="stylesheet" href="preview.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    flex-direction: column;
    /* 글래스모피즘: 유리 뒤로 비칠 컬러 그라데이션 배경 */
    background:
      radial-gradient(1100px 720px at 12% -8%, rgba(124, 92, 255, 0.30), transparent 60%),
      radial-gradient(1000px 700px at 108% 12%, rgba(38, 132, 255, 0.26), transparent 60%),
      radial-gradient(900px 640px at 60% 116%, rgba(236, 72, 153, 0.18), transparent 60%),
      linear-gradient(160deg, #14131f 0%, #191830 55%, #141324 100%);
  }
  /* 유리 재질 공통 변수감 (참고): rgba 배경 + backdrop blur + 옅은 흰 테두리 */

  /* ---------- 상단 툴바 ---------- */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    /* 유리 재질 툴바 */
    background: rgba(38, 38, 64, 0.55);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.28);
    flex-shrink: 0;
    z-index: 20;
  }
  #toolbar button {
    font-family: inherit;
    font-size: 13px;
    color: #e9e9f6;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 9px;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  #toolbar button:hover {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(255, 255, 255, 0.22);
  }
  #toolbar button:active { background: rgba(255, 255, 255, 0.20); }
  #toolbar button.primary {
    background: rgba(99, 102, 241, 0.85);
    border-color: rgba(147, 150, 255, 0.7);
    font-weight: 600;
    box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
  }
  #toolbar button.primary:hover { background: rgba(116, 119, 245, 0.95); }

  /* ---------- 툴바 드롭다운 메뉴 (파일 등) ---------- */
  .menu-group { position: relative; flex-shrink: 0; }
  .menu-group > button.has-caret::after {
    content: "▾";
    font-size: 16px;
    line-height: 1;
    margin-left: 7px;
    opacity: 0.85;
    vertical-align: middle;
  }
  .menu-group.open > button.has-caret::after { opacity: 1; }
  /* 모던 & 심플 드롭다운 (목록 형태) */
  .dropdown {
    position: absolute;
    top: calc(100% + 7px);
    left: 0;
    z-index: 30;
    display: none;
    min-width: 220px;
    padding: 6px 0;
    background: rgba(38, 38, 62, 0.72);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    animation: dd-in 0.13s ease;
  }
  @keyframes dd-in {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .menu-group.open .dropdown { display: block; }
  .menu-group.open > button.has-caret { background: #52527e; }
  /* 목록형 항목: 아이콘 + 텍스트의 평평한 리스트 행 (버튼 느낌 제거) */
  .dropdown button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    font-size: 13px;
    font-weight: 400;
    color: #c5c5dd;
    background: none;
    border: none;
    border-radius: 0;
    padding: 8px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s, color 0.1s;
  }
  .dropdown button + button { border-top: 1px solid #2f2f48; }  /* 행 사이 옅은 구분선 */
  .dropdown button:hover { background: #313150; color: #fff; }
  .dropdown .menu-sep { display: none; }
  #file-path {
    flex: 1;
    min-width: 0;
    margin-left: 8px;
    font-size: 13px;
    color: #a5a5c5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl; /* 긴 경로일 때 뒷부분(파일명)이 보이도록 */
    text-align: left;
  }
  #file-path .dirty { color: #fbbf24; font-weight: 700; }
  #file-path.clickable { cursor: pointer; }
  #file-path.clickable:hover .name { color: #a5b4fc; text-decoration: underline; }

  /* ---------- 언어 토글 (KOR/ENG) ---------- */
  #lang-toggle {
    flex-shrink: 0;
    display: flex;
    gap: 0;
    margin-left: 8px;
    border: 1px solid #4a4a6a;
    border-radius: 7px;
    overflow: hidden;
  }
  #lang-toggle button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: #a5a5c5;
    background: #2b2b40;
    border: none;
    padding: 6px 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #lang-toggle button:hover { background: #3a3a58; color: #e4e4f0; }
  #lang-toggle button.active { background: #6366f1; color: #fff; }

  /* ---------- 파일 탭 바 ---------- */
  #tabbar {
    display: flex;
    align-items: stretch;
    background: rgba(26, 26, 46, 0.45);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    flex-shrink: 0;
  }
  #tabbar > button {
    background: none;
    border: none;
    color: #8a8ab0;
    cursor: pointer;
    padding: 0 9px;
    font-size: 11px;
    flex-shrink: 0;
  }
  #tabbar > button:hover { color: #fff; background: #31314e; }
  #tabs {
    flex: 1;
    min-width: 0;
    display: flex;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 9px 6px 14px;
    font-size: 12.5px;
    color: #a5a5c5;
    cursor: pointer;
    border-right: 1px solid #2d2d44;
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
    max-width: 230px;
  }
  .tab:hover { background: rgba(255, 255, 255, 0.06); }
  /* 활성 탭: 유리 위 은은한 밝은 층 + 상단 인디고 라인 */
  .tab.active { background: rgba(255, 255, 255, 0.12); color: #fff; box-shadow: inset 0 2px 0 #818cf8; }
  .tab-name { overflow: hidden; text-overflow: ellipsis; }
  .tab-name .dirty { color: #fbbf24; }
  .tab-close {
    font-size: 10px;
    color: #6b6b8f;
    border-radius: 3px;
    padding: 1px 4px;
  }
  .tab-close:hover { background: #44446a; color: #fff; }

  /* ---------- 본문: 좌우 분할 ---------- */
  #main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* ---------- 좌측 폴더 탐색 패널 ---------- */
  #sidebar {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.18s ease;
    background: rgba(26, 26, 46, 0.5);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
  }
  #sidebar.open { width: 280px; }
  #sb-divider {
    width: 4px;
    flex-shrink: 0;
    background: #3b3b55;
    cursor: col-resize;
    display: none;
  }
  #sidebar.open + #sb-divider { display: block; }
  #sb-divider:hover { background: #6366f1; }
  #sidebar-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 7px 8px;
    border-bottom: 1px solid #3b3b55;
    min-width: 280px;
  }
  #sidebar-header button {
    background: none;
    border: none;
    color: #a5a5c5;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 7px;
    border-radius: 5px;
  }
  #sidebar-header button:hover { background: #383854; color: #fff; }
  #sb-path {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: #a5a5c5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
    text-align: left;
  }
  #sb-drives {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 10px;
    border-bottom: 1px solid #3b3b55;
    min-width: 280px;
  }
  .sb-drive {
    font-size: 12px;
    color: #c5c5dd;
    background: #31314e;
    border: 1px solid #44446a;
    border-radius: 5px;
    padding: 2px 9px;
    cursor: pointer;
    user-select: none;
  }
  .sb-drive:hover { background: #3d3d61; }
  .sb-drive.active { background: #4048a0; border-color: #6366f1; color: #fff; }
  #sb-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 5px 0;
    min-width: 280px;
  }
  #sb-list::-webkit-scrollbar-track { background: #232336; }
  #sb-list::-webkit-scrollbar-thumb { background: #3f3f5c; border-radius: 6px; }
  .sb-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    font-size: 13px;
    color: #c5c5dd;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .sb-item > span {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-item:hover { background: #31314e; }
  .sb-item.file.active { background: #4048a0; color: #fff; }
  .sb-item.hidden-item { opacity: 0.5; }              /* 숨김 파일/폴더는 흐리게 */
  .sb-item.hidden-item.active { opacity: 1; }
  .sb-empty { padding: 12px 14px; font-size: 12px; color: #6b6b8f; }
  /* 드래그 이동 시 놓을 수 있는 대상 표시 */
  .sb-item.drop-target { background: #4048a0; box-shadow: inset 0 0 0 1px #6366f1; color: #fff; }
  .sb-drive.drop-target { background: #4048a0; border-color: #6366f1; color: #fff; }
  /* 이름 변경 인라인 입력 */
  .sb-rename {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 13px;
    color: #fff;
    background: #1e1e2e;
    border: 1px solid #6366f1;
    border-radius: 4px;
    padding: 1px 6px;
    outline: none;
  }

  /* ---------- 우클릭 컨텍스트 메뉴 ---------- */
  #ctx-menu {
    position: fixed;
    z-index: 200;
    display: none;
    min-width: 168px;
    padding: 6px;
    background: rgba(40, 40, 66, 0.72);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
  }
  .ctx-item {
    padding: 8px 12px;
    font-size: 13px;
    color: #e4e4f0;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .ctx-item:hover { background: rgba(255, 255, 255, 0.12); }
  .ctx-item.danger { color: #f87171; }
  .ctx-item.danger:hover { background: #7f1d1d; color: #fff; }
  #editor-pane, #preview-pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .pane-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 14px;
    text-transform: uppercase;
  }
  .btn-full {
    font-family: inherit;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 2px 8px;
    cursor: pointer;
    background: transparent;
  }
  #editor-pane .btn-full { color: #8a8ab0; }
  #editor-pane .btn-full:hover { background: #383854; color: #e4e4f0; }
  #preview-pane .btn-full { color: #6b7280; }
  #preview-pane .btn-full:hover { background: #dfe2e8; color: #1f2328; }

  /* 전체보기 모드 (분할 드래그로 지정된 고정 너비(inline flex)를 !important로 무시) */
  #main.full-editor #preview-pane, #main.full-editor #divider { display: none; }
  #main.full-preview #editor-pane, #main.full-preview #divider { display: none; }
  #main.full-editor #editor-pane { flex: 1 1 auto !important; }
  #main.full-preview #preview-pane { flex: 1 1 auto !important; }

  /* 맨 위로 가기 버튼 (연하게, 호버 시 진하게) */
  #editor-pane, #preview-pane { position: relative; }
  .scroll-top {
    position: absolute;
    right: 20px;
    bottom: 16px;
    z-index: 5;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(120, 120, 170, 0.35);
    background: rgba(120, 120, 170, 0.16);
    color: rgba(200, 200, 230, 0.6);
    font-size: 15px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s;
  }
  .scroll-top:hover { opacity: 1; background: rgba(99, 102, 241, 0.5); color: #fff; }
  #preview-pane .scroll-top {
    border-color: rgba(60, 60, 90, 0.25);
    background: rgba(120, 120, 150, 0.13);
    color: rgba(60, 60, 90, 0.55);
  }
  #preview-pane .scroll-top:hover { background: rgba(99, 102, 241, 0.75); color: #fff; }

  /* 탭 드래그 정렬 표시 */
  .tab.drag-over { box-shadow: inset 3px 0 0 #6366f1; }
  .tab.dragging { opacity: 0.4; }
  #editor-pane .pane-label { color: #b7b7d6; background: rgba(26, 26, 46, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  /* 파일 생성일/수정일 표시 */
  #file-times {
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    font-size: 11px;
    color: #6b6b8f;
    margin-left: 12px;
    white-space: nowrap;
  }
  #preview-pane .pane-label { color: #5b6172; background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 0, 0, 0.06); }

  #editor-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    /* 유리 느낌의 어두운 편집 영역 (가독성 유지) */
    background: rgba(20, 20, 34, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #editor {
    width: 100%;
    height: 100%;
    resize: none;
    border: 0;
    outline: none;
    padding: 18px 20px 60vh;
    background: transparent;
    position: relative;
    z-index: 1;
    color: #dcdcee;
    font-family: "Cascadia Code", Consolas, "D2Coding", monospace;
    font-size: 14px;
    line-height: 1.7;
    tab-size: 4;
    caret-color: #a5b4fc;
  }
  #editor::selection { background: #44446a; }

  /* ---------- 검색 하이라이트 (textarea 뒤에 겹쳐 그리는 레이어) ---------- */
  #editor-backdrop {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }
  #editor-highlights {
    /* #editor와 동일한 텍스트 배치가 되도록 폰트/패딩/줄바꿈 규칙을 맞춤
       (textarea wrap="off" 이므로 줄바꿈 없이 pre + 내용 너비로 확장) */
    padding: 18px 20px 60vh;
    font-family: "Cascadia Code", Consolas, "D2Coding", monospace;
    font-size: 14px;
    line-height: 1.7;
    tab-size: 4;
    white-space: pre;
    width: max-content;
    min-width: 100%;
    color: transparent;
  }
  #editor-highlights mark { background: rgba(250, 204, 21, 0.3); color: transparent; border-radius: 2px; }
  /* 현재 검색 위치: 은은한 주황 + 연한 펄스 애니메이션 */
  #editor-highlights mark.current {
    background: rgba(249, 115, 22, 0.5);
    border-radius: 2px;
    animation: hl-pulse-soft 1.5s ease-in-out infinite;
  }
  /* 연한 펄스: 옅은 글로우가 부드럽게 커졌다 작아짐 (에디터/프리뷰/설명서 검색 공통) */
  @keyframes hl-pulse-soft {
    0%, 100% { box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.4); }
    50%      { box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.16); }
  }
  /* 프리뷰 쪽 검색 하이라이트 (pymdownx.mark의 ==하이라이트==와 구분되는 클래스) */
  #preview mark.search-hl {
    background: #fde047;
    color: inherit;
    padding: 0 1px;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(202, 138, 4, 0.45);
  }
  /* 프리뷰의 현재 검색 위치도 동일하게 은은히 + 연한 펄스 */
  #preview mark.search-hl.current {
    background: #fdba74;
    color: inherit;
    border-radius: 2px;
    animation: hl-pulse-soft 1.5s ease-in-out infinite;
  }

  /* ---------- 검색 바 ---------- */
  #search-bar {
    position: absolute;
    top: 27px;
    right: 18px;
    z-index: 6;
    display: none;
    align-items: center;
    gap: 5px;
    padding: 6px 8px;
    background: rgba(40, 40, 66, 0.7);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
  }
  #search-bar.open { display: flex; }
  #search-input {
    width: 190px;
    font-family: inherit;
    font-size: 13px;
    color: #e9e9f6;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    padding: 5px 9px;
    outline: none;
  }
  #search-input:focus { border-color: #818cf8; }
  #search-count {
    font-size: 12px;
    color: #8a8ab0;
    min-width: 42px;
    text-align: center;
    white-space: nowrap;
  }
  .search-btn {
    font-family: inherit;
    font-size: 12px;
    color: #a5a5c5;
    background: none;
    border: none;
    border-radius: 5px;
    padding: 4px 7px;
    cursor: pointer;
  }
  .search-btn:hover { background: #46466a; color: #fff; }
  .search-btn.active { background: #4048a0; color: #fff; }

  #divider {
    width: 5px;
    flex-shrink: 0;
    background: #3b3b55;
    cursor: col-resize;
  }
  #divider:hover { background: #6366f1; }

  #preview-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;   /* 표/코드 등 넓은 내용은 가로 스크롤 */
    /* 프리뷰는 가독성을 위해 밝은 반투명 유리 카드 */
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px) saturate(120%);
    -webkit-backdrop-filter: blur(12px) saturate(120%);
    padding: 24px 36px 60vh;
  }

  /* 스크롤바 (가로 스크롤바는 더 두껍고 진하게 = 잘 보이게) */
  ::-webkit-scrollbar { width: 12px; height: 15px; }
  ::-webkit-scrollbar-corner { background: transparent; }
  #editor::-webkit-scrollbar-track { background: #191926; }
  #editor::-webkit-scrollbar-thumb { background: #4a4a6e; border-radius: 7px; border: 2px solid #191926; }
  #editor::-webkit-scrollbar-thumb:hover { background: #6366f1; }
  /* 에디터 가로 스크롤바: 세로보다 더 눈에 띄는 색 */
  #editor::-webkit-scrollbar-thumb:horizontal { background: #6b6ba0; }
  #editor::-webkit-scrollbar-thumb:horizontal:hover { background: #8385f5; }
  #preview-scroll::-webkit-scrollbar-track { background: #eceef2; }

/* 플랫폼: macOS는 단축키 표기를 Ctrl → Command로 바꾼다 (동작은 ⌘ 키) */
const IS_MAC = /mac|iphone|ipad|ipod/i.test((navigator.platform || '') + ' ' + (navigator.userAgent || ''));
function modKey(s) { return IS_MAC ? String(s).replace(/Ctrl/g, 'Command') : s; }

function setTxt(id, s) { const el = document.getElementById(id); if (el) el.textContent = s; }
function setTitle(id, s) { const el = document.getElementById(id); if (el) el.title = modKey(s); }

/* ---------- 렌더링 (실시간) ----------
   변환 요청이 밀려 쌓이지 않도록: 진행 중이면 최신 내용 하나만 대기시키고,
   같은 내용은 다시 변환하지 않음 */
let rendering = false;
let renderQueued = false;
let lastRendered = null;

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderNow, 100);
}

async function renderNow() {
  const text = editor.value;
  if (text === lastRendered) return;   // 내용 그대로면 스킵
  if (rendering) { renderQueued = true; return; }
  rendering = true;
  try {
    const r = await window.pywebview.api.render(text);
    lastRendered = text;
    preview.innerHTML = r.html;
    if (searchBar && searchBar.classList.contains('open')) highlightPreview();
  } catch (e) { /* API 준비 전 호출은 무시 */ }
  rendering = false;
  if (renderQueued) {
    renderQueued = false;
    renderNow();                        // 대기 중이던 최신 내용 반영
  }
}

/* ---------- 상태 표시 ---------- */
const fileTimesEl = document.getElementById('file-times');

/* 에디터 상단에 현재 파일의 최초 생성일/최근 수정일 표시 */
async function updateFileTimes() {
  if (!currentPath) { fileTimesEl.textContent = ''; return; }
  const requested = currentPath;
  try {
    const r = await window.pywebview.api.file_times(requested);
    if (currentPath !== requested) return; // 응답 전에 탭이 바뀌면 무시
    fileTimesEl.textContent = r ? (L().createdLabel + r.created + L().modifiedLabel + r.modified) : '';
  } catch (e) { fileTimesEl.textContent = ''; /* API 준비 전 무시 */ }
}

function updatePath() {
  const name = currentPath || L().newDoc;
  const dirty = activeTab ? activeTab.dirty : false;
  filePathEl.innerHTML = (dirty ? '<span class="dirty">● </span>' : '')
    + '<span class="name"></span>';
  filePathEl.querySelector('.name').textContent = name;
  filePathEl.classList.toggle('clickable', !!currentPath);
  filePathEl.title = currentPath ? name + L().filePathTitle : name;
  updateFileTimes();
}

filePathEl.addEventListener('click', () => {
  if (currentPath) window.pywebview.api.show_in_explorer();
});

function updateStats() {
  const pos = editor.selectionStart;
  const before = editor.value.slice(0, pos);
  const line = (before.match(/\n/g) || []).length + 1;
  const col = pos - before.lastIndexOf('\n');
  statPos.textContent = line + ':' + col;
  statLen.textContent = editor.value.length.toLocaleString() + L().charSuffix;
}

function flash(msg) {
  statMsg.textContent = msg;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => statMsg.textContent = '', 3000);
}

function setDirty(d) {
  if (activeTab && activeTab.dirty !== d) {
    activeTab.dirty = d;
    updatePath();
    renderTabs();
  }
}

/* ---------- 동기 스크롤 ---------- */
let scrollSource = null;
let scrollResetTimer = null;

function syncScroll(src, dst) {
  if (scrollSource && scrollSource !== src) return;
  scrollSource = src;
  const srcMax = src.scrollHeight - src.clientHeight;
  const dstMax = dst.scrollHeight - dst.clientHeight;
  if (srcMax > 0) dst.scrollTop = (src.scrollTop / srcMax) * dstMax;
  clearTimeout(scrollResetTimer);
  scrollResetTimer = setTimeout(() => scrollSource = null, 120);
}

editor.addEventListener('scroll', () => syncScroll(editor, previewScroll));
previewScroll.addEventListener('scroll', () => syncScroll(previewScroll, editor));

  scheduleRender();
  updateStats();
  refreshSearch();
});
/* 키보드에서 손을 뗄 때마다 즉시 렌더링 */
editor.addEventListener('keyup', () => {

  clearTimeout(renderTimer);
  renderNow();
});
editor.addEventListener('click', updateStats);

/* Tab 키 → 공백 4칸 삽입 */
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, epos = editor.selectionEnd;
    editor.setRangeText('    ', s, epos, 'end');
    setDirty(true);
    scheduleRender();
  }
});

/* ---------- 파일/탭 동작 ---------- */
const tabsEl = document.getElementById('tabs');

function syncEditorToTab() {
  if (activeTab) activeTab.content = editor.value;
}

/* 열린 탭 목록을 저장 → 다음 실행 때 그대로 복원 */
function saveSession() {
  try {
    const files = tabs.filter(t => t.path).map(t => t.path);
    const active = (activeTab && activeTab.path) ? files.indexOf(activeTab.path) : -1;
    window.pywebview.api.save_session(files, active);
  } catch (e) { /* API 준비 전이면 무시 */ }
}

function showActiveTab() {
  currentPath = activeTab ? activeTab.path : null;
  editor.value = activeTab ? activeTab.content : '';
  updatePath();
  updateStats();
  renderTabs();
  renderNow();
  markActiveFile();
  saveSession();
  refreshSearch();
}

let dragTab = null; // 드래그 중인 탭

function renderTabs() {
  tabsEl.innerHTML = '';
  for (const t of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (t === activeTab ? ' active' : '');
    /* 드래그로 탭 순서 변경 */
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      dragTab = t;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => { dragTab = null; renderTabs(); });
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (dragTab && dragTab !== t) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (!dragTab || dragTab === t) return;
      const from = tabs.indexOf(dragTab);
      const to = tabs.indexOf(t);
      tabs.splice(from, 1);
      tabs.splice(to, 0, dragTab);
      dragTab = null;
      renderTabs();
      saveSession();
    });
    const nm = document.createElement('span');
    nm.className = 'tab-name';
    nm.innerHTML = (t.conf ? '<span class="tab-badge">' + L().confBadge + '</span>' : '')
      + (t.dirty ? '<span class="dirty">● </span>' : '');
    nm.append(document.createTextNode(t.conf ? t.name : (t.path ? t.name : L().newDoc)));
    nm.title = t.conf ? (L().confBadge + ': ' + t.name) : (t.path || L().newDoc);
    const x = document.createElement('span');
    x.className = 'tab-close';
    x.textContent = '✕';
    x.title = L().tabClose_t;
    x.addEventListener('click', (e) => { e.stopPropagation(); closeTab(t); });
    el.append(nm, x);
    el.addEventListener('click', () => activateTab(t));
    tabsEl.appendChild(el);
  }
  const act = tabsEl.querySelector('.tab.active');
  if (act) act.scrollIntoView({ inline: 'nearest', block: 'nearest' });
}

/* 탭 클릭(전환) 시: 디스크의 최신 내용과 버퍼가 다르면 재로딩 여부 확인 */
async function activateTab(t) {
  syncEditorToTab();
  activeTab = t;
  if (t.path) {
    const r = await window.pywebview.api.open_path(t.path);
    if (r && r.content !== t.content) {
      if (confirm(L().reloadConfirm)) {
        t.content = r.content;
        t.dirty = false;
      } else {
        t.dirty = true; // 버퍼 유지 → 디스크와 다른 상태
      }
    } else if (r) {
      t.dirty = false;
    }
  } else {
    await window.pywebview.api.new_file();
  }
  showActiveTab();
}

/* 파일을 탭으로 열기 (열기 대화상자/디렉토리 패널 공용) */
async function openFileIntoTabs(r) {
  const existing = tabs.find(t => t.path === r.path);
  if (existing) { await activateTab(existing); return; }
  syncEditorToTab();
  const t = { path: r.path, name: baseName(r.path), content: r.content, dirty: false };
  tabs.push(t);
  activeTab = t;
  showActiveTab();
  editor.scrollTop = 0;
  flash(L().openDone);
}

async function closeTab(t) {
  if (t === activeTab) syncEditorToTab();
  if (t.dirty && !confirm(L().closeTabConfirm)) return;
  const idx = tabs.indexOf(t);
  tabs.splice(idx, 1);
  if (t === activeTab) {
    if (!tabs.length) { await doNew(); return; }
    await activateTab(tabs[Math.max(0, idx - 1)]);
  } else {
    renderTabs();
    saveSession();
  }
}

async function doNew() {
  syncEditorToTab();
  await window.pywebview.api.new_file();
  const t = { path: null, name: L().newDoc, content: '', dirty: false };
  tabs.push(t);
  activeTab = t;
  showActiveTab();
}

async function doOpen() {
  const r = await window.pywebview.api.open_file();
  if (!r) return;
  await openFileIntoTabs(r);
}

async function doSave() {
  if (!activeTab) return;
  syncEditorToTab();
  /* Confluence 페이지로 열린 탭이면 Confluence로 업데이트 */
  if (activeTab.conf) { await confUpdateCurrent(); return; }
  const r = await window.pywebview.api.save_file(editor.value);
  if (!r) return;
  activeTab.path = r.path;
  activeTab.name = baseName(r.path);
  activeTab.dirty = false;
  currentPath = r.path;
  updatePath();
  renderTabs();
  markActiveFile();
  saveSession();
  flash(L().savedPrefix + r.path + (r.backup ? L().backupTag : ''));
}

/* 다른 이름으로 저장 */
async function doSaveAs() {
  if (!activeTab) return;
  syncEditorToTab();
  const d = await window.pywebview.api.save_as_dialog(activeTab.path ? activeTab.name : 'untitled.md');
  if (!d) return;
  await window.pywebview.api.save_to(d.path, activeTab.content);
  activeTab.path = d.path;
  activeTab.name = baseName(d.path);
  activeTab.dirty = false;
  currentPath = d.path;
  await window.pywebview.api.set_current(d.path);
  updatePath();
  renderTabs();
  markActiveFile();
  saveSession();
  flash(L().savedPrefix + d.path);
}

/* 모두 저장: 열려있는 모든 탭을 현재 버퍼 기준으로 일괄 저장 */
async function doSaveAll() {
  /* 실수 방지: 반드시 확인을 받아야 진행 */
  if (!confirm(L().saveAllConfirm(tabs.length))) return;
  syncEditorToTab();
  let saved = 0;
  for (const t of tabs) {
    if (t.path) {
      if (!t.dirty) continue; // 변경 없는 파일은 그대로
      await window.pywebview.api.save_to(t.path, t.content);
      t.dirty = false;
      saved++;
    } else {
      const d = await window.pywebview.api.save_as_dialog('untitled.md');
      if (!d) continue; // 취소하면 해당 탭은 건너뜀
      await window.pywebview.api.save_to(d.path, t.content);
      t.path = d.path;
      t.name = baseName(d.path);
      t.dirty = false;
      saved++;
    }
  }
  if (activeTab && activeTab.path) {
    currentPath = activeTab.path;
    await window.pywebview.api.set_current(activeTab.path);
  }
  updatePath();
  renderTabs();
  markActiveFile();
  flash(L().savedAll(saved));
}

/* 모두 닫기: 변경사항 있는 파일마다 저장 여부를 확인하며 전체 닫기 */
async function doCloseAll() {
  /* 실수 방지: 반드시 확인을 받아야 진행 */
  if (!confirm(L().closeAllConfirm(tabs.length))) return;
  syncEditorToTab();
  for (const t of [...tabs]) {
    if (t.dirty) {
      if (confirm(L().closeAllPerFile(t.path ? t.name : L().newDoc))) {
        if (t.path) {
          await window.pywebview.api.save_to(t.path, t.content);
        } else {
          const d = await window.pywebview.api.save_as_dialog('untitled.md');
          if (d) await window.pywebview.api.save_to(d.path, t.content);
        }
      }
    }
    tabs.splice(tabs.indexOf(t), 1);
  }
  activeTab = null;
  await doNew(); // 빈 새 문서 탭 하나로 시작
}

document.getElementById('btn-saveas').addEventListener('click', doSaveAs);

/* 탭 바 좌우 이동 - 한 파일(탭)씩 스크롤 */
function scrollTabs(dir) {
  const children = [...tabsEl.children];
  if (!children.length) return;
  const sl = tabsEl.scrollLeft;
  if (dir > 0) {
    const next = children.find(c => c.offsetLeft > sl + 1);
    if (next) tabsEl.scrollTo({ left: next.offsetLeft });
  } else {
    const prev = [...children].reverse().find(c => c.offsetLeft < sl - 1);
    if (prev) tabsEl.scrollTo({ left: prev.offsetLeft });
  }
}
document.getElementById('tab-left').addEventListener('click', () => scrollTabs(-1));
document.getElementById('tab-right').addEventListener('click', () => scrollTabs(1));

| 🌐 HTML 내보내기 | 미리보기 모습 그대로 단일 HTML 파일로 저장합니다 | - |
| ❓ 설명서 | 이 설명서를 모달 창으로 표시합니다 | - |

우측의 **파일 경로 표시줄**을 클릭하면 현재 파일 위치가 탐색기에서 열립니다.
파일명 앞의 <span style="color:#b45309">●</span> 표시는 **저장되지 않은 변경사항**이 있다는 뜻입니다.

## 🔍 검색 기능

- \`Ctrl+F\` 또는 툴바의 **🔍 검색** 버튼으로 검색 바를 엽니다.
- 입력하는 즉시 에디터의 모든 일치 위치가 **노란색으로 하이라이트**되고, 현재 위치는 주황색으로 표시됩니다.
- 우측 **미리보기 화면에도** 일치하는 단어가 노란색으로 함께 표시됩니다.
- 검색 바의 카운터(예: \`3/12\`)로 현재 위치/전체 개수를 확인할 수 있습니다.

| 조작 | 동작 |
|------|------|
| \`Enter\` / ▼ | 다음 결과로 이동 |
| \`Shift+Enter\` / ▲ | 이전 결과로 이동 |
| \`F3\` / \`Shift+F3\` | 검색 바가 닫혀 있어도 다음/이전 결과 이동 |
| \`Aa\` 버튼 | 대소문자 구분 켜기/끄기 |
| \`Esc\` / ✕ | 검색 바 닫기 (마지막 결과가 선택된 채 에디터로 복귀) |

에디터에서 단어를 선택한 뒤 \`Ctrl+F\`를 누르면 해당 단어가 자동으로 검색어에 입력됩니다.

> 💡 이 **설명서 모달이 열려 있을 때** \`Ctrl+F\`를 누르면 상단의 **설명서 검색창**이 활성화됩니다.
> 각 탭(프로그램 사용 설명 / 마크다운 사용법 / 버전 기록)별로 현재 보고 있는 내용이 검색되며,
> \`Enter\`/\`Shift+Enter\`로 다음/이전 결과로 이동합니다.

## 🗂️ 폴더 탐색 패널

- **🗂️ 디렉토리** 버튼으로 좌측 패널을 열면 드라이브/폴더를 탐색할 수 있습니다.
- 상단의 드라이브 칩(\`C:\` \`D:\` …)을 클릭해 드라이브를 바로 이동할 수 있습니다.
- 폴더는 **한 번 클릭**으로 이동, \`..\` 항목 클릭 또는 ⬆️ 버튼으로 상위 폴더 이동.
- 마크다운 파일(\`.md\` \`.markdown\` \`.mdown\` \`.txt\`)을 **더블클릭**하면 탭으로 열립니다.
- 패널 오른쪽 경계를 드래그하면 폭을 조절할 수 있습니다.

### 파일 관리 (우클릭 메뉴)

- 파일을 **우클릭**하면 메뉴가 나타납니다:
    - **✏️ 이름 변경**: 목록 안에서 바로 새 이름을 입력합니다 (\`Enter\` 확정, \`Esc\` 취소)
    - **🗑️ 삭제**: 확인 후 파일을 삭제합니다 (열려 있던 탭도 함께 닫힘)
    - **📄 새 파일**: 현재 폴더에 \`noname.md\`를 만듭니다 (이미 있으면 \`noname_1.md\`, \`noname_2.md\` … 순서로 자동 이름)
- 파일 목록의 **빈 곳을 우클릭**해도 새 파일을 만들 수 있습니다.

### 파일 이동 (드래그 앤 드롭)

- 파일을 **드래그**해서 폴더, \`..\`(상위 폴더), 상단 드라이브 칩 위에 놓으면 그 위치로 이동합니다.
- 대상 폴더에 같은 이름의 파일이 있으면 이동하지 않고 알려줍니다.
- 열려 있는 탭의 파일을 이동하면 탭 경로도 자동으로 갱신됩니다.

## 📑 파일 탭

- 여러 파일을 동시에 열어 탭으로 전환하며 편집합니다.
- 탭을 **드래그**하여 순서를 바꿀 수 있습니다.
- ◀ ▶ 버튼으로 탭 목록을 좌우로 스크롤합니다.
- 탭 전환 시 디스크의 파일이 밖에서 수정되었으면 다시 불러올지 물어봅니다.
- 열려 있던 탭 목록은 자동 저장되어 **다음 실행 때 그대로 복원**됩니다.

## ✏️ 에디터 / 👁️ 미리보기

- 입력 후 잠시 멈추면(0.1초) 자동으로 미리보기가 갱신됩니다.
- 에디터 상단에 현재 파일의 **최초 생성일 / 최근 수정일**이 \`년-월-일 시:분:초\` 형식으로 표시됩니다 (저장하면 수정일 갱신).
- **동기 스크롤**: 한쪽을 스크롤하면 반대쪽도 같은 비율로 따라갑니다.
- 가운데 구분선을 **드래그**하면 좌우 비율 조절, **더블클릭**하면 50:50으로 초기화됩니다.
- 각 패널의 **⛶ 전체보기** 버튼으로 에디터만/미리보기만 크게 볼 수 있습니다.
- \`Tab\` 키는 공백 4칸을 입력합니다.
- 우측 하단 ▲ 버튼으로 맨 위로 이동합니다.
- 하단 상태바에 커서 위치(줄:칸)와 글자 수가 표시됩니다.

## 📝 지원 마크다운 문법

기본 문법(제목, 목록, 인용, 링크, 이미지, 표, 코드 블록)에 더해 아래 확장 문법을 지원합니다.

- **코드 하이라이팅**: 코드 블록에 언어 이름(예: \`python\`, \`js\`)을 지정하면 구문 강조
- **작업 목록**: \`- [x] 완료\` / \`- [ ] 할 일\`
- ~~취소선~~ \`~~텍스트~~\`, ==하이라이트== \`==텍스트==\`, 윗첨자 \`^텍스트^\`, 아랫첨자 \`~텍스트~\`
- **각주**, **약어**, **정의 목록**, **Admonition**(주의/참고 상자)
- URL 자동 링크 (magiclink)

\`\`\`python
# 코드 블록 예시
def hello(name: str) -> str:
    return f"안녕하세요, {name}님!"
\`\`\`

> 💡 이 설명서는 **닫기** 버튼, 우측 상단 **✕**, 창 바깥 영역 클릭 또는 \`Esc\` 키로 닫을 수 있습니다.

## 28. Escaping (show characters literally)

To show a Markdown symbol **literally** instead of as syntax, put a backslash (\\\\) before it.
Targets: backslash (\\\\), backtick (\\\`), \`*\` \`_\` \`{}\` \`[]\` \`()\` \`#\` \`+\` \`-\` \`.\` \`!\` \`|\`

**Syntax**
\`\`\`markdown
\\*asterisks literally\\* and \\# a literal hash.
\`\`\`

**Result**

\\*asterisks literally\\* and \\# a literal hash.

---

## 29. Raw HTML

You can use HTML tags directly for formatting that's hard to express in Markdown —
text color, underline, collapsible details, etc.

**Syntax**
\`\`\`markdown
<span style="color:#e11d48">red text</span> and <u>underline</u>

<details>
<summary>Expand hidden content</summary>
This was hidden.
</details>
\`\`\`

**Result**

<span style="color:#e11d48">red text</span> and <u>underline</u>

<details>
<summary>Expand hidden content</summary>
This was hidden.
</details>

---

## 30. Auto Table of Contents ([TOC])

Put \`[TOC]\` alone on a line to auto-generate a table of contents from the headings.

**Syntax**
\`\`\`markdown
[TOC]

# Chapter 1
## Section 1.1
# Chapter 2
\`\`\`

**Result**: all headings in the document become a hierarchical TOC of links.
(Adding it here would generate a TOC of all 30 items, so the example is omitted.)

const helpSearchInput = document.getElementById('help-search-input');
const helpSearchCount = document.getElementById('help-search-count');
let helpMatches = [];   // 현재 탭의 <mark> 요소 목록
let helpMatchIdx = -1;

function activeHelpArticle() {
  if (helpContentMd.style.display !== 'none') return helpContentMd;
  if (helpContentVer.style.display !== 'none') return helpContentVer;
  return helpContent;
}

function clearHelpHighlights() {
  helpBody.querySelectorAll('mark.help-hl').forEach(mk => {
    const p = mk.parentNode;
    p.replaceChild(document.createTextNode(mk.textContent), mk);
    p.normalize();
  });
  helpMatches = [];
  helpMatchIdx = -1;
}

function updateHelpCount() {
  helpSearchCount.textContent = helpSearchInput.value
    ? (helpMatches.length ? (helpMatchIdx + 1) + '/' + helpMatches.length : '0/0') : '';
}

function runHelpSearch() {
  clearHelpHighlights();
  const q = helpSearchInput.value;
  if (!q) { updateHelpCount(); return; }
  const root = activeHelpArticle();
  const needle = q.toLowerCase();
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const targets = [];
  let node;
  while ((node = walker.nextNode())) {
    if (node.nodeValue.toLowerCase().includes(needle)) targets.push(node);
  }
  for (const tn of targets) {
    const text = tn.nodeValue;
    const hay = text.toLowerCase();
    const frag = document.createDocumentFragment();
    let last = 0, i = hay.indexOf(needle);
    while (i !== -1) {
      frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mk = document.createElement('mark');
      mk.className = 'help-hl';
      mk.textContent = text.slice(i, i + needle.length);
      frag.appendChild(mk);
      last = i + needle.length;
      i = hay.indexOf(needle, last);
    }
    frag.appendChild(document.createTextNode(text.slice(last)));
    tn.parentNode.replaceChild(frag, tn);
  }
  helpMatches = [...root.querySelectorAll('mark.help-hl')];
  if (helpMatches.length) gotoHelpMatch(1); // 첫 결과로 이동
  else updateHelpCount();
}

function gotoHelpMatch(dir) {
  if (!helpMatches.length) return;
  if (helpMatchIdx >= 0) helpMatches[helpMatchIdx].classList.remove('current');
  helpMatchIdx = (helpMatchIdx + dir + helpMatches.length) % helpMatches.length;
  const cur = helpMatches[helpMatchIdx];
  cur.classList.add('current');
  cur.scrollIntoView({ block: 'center' });
  updateHelpCount();
}

async function loadDir(path) {
  const r = await window.pywebview.api.list_dir(path || null);

  sbDrives.innerHTML = '';
  const drv = r.drives || [];
  let activeDrive = null;
  if (r.path !== '::drives') {
    const up = r.path.toUpperCase();
    for (const d of drv) {
      const base = d.path.toUpperCase().replace(/[\\/]+$/, '');
      if (up === base || up.startsWith(base + '\\') || up.startsWith(base + '/') || d.path === '/') {
        if (!activeDrive || d.path.length > activeDrive.path.length) activeDrive = d;

  for (const d of drv) {

    if (r.parent !== '::drives') addDropTarget(up, r.parent);

  for (const d of r.dirs) {

    addDropTarget(el, d.path);
    sbList.appendChild(el);

  for (const f of r.files) {
    const el = makeItem(f.md ? '📄' : '📃', f.name);
    el.classList.add('file');
    if (f.hidden) el.classList.add('hidden-item');

    el.addEventListener('dblclick', async () => {
      const opened = await window.pywebview.api.open_path(f.path);
      if (opened) await openFileIntoTabs(opened);
    });
    /* 드래그로 다른 폴더에 이동 */
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      dragFile = f.path;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', f.path);

    el.addEventListener('dragend', () => { dragFile = null; });
    /* 우클릭 메뉴: 이름 변경 / 삭제 / 새 파일 */
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();

        { label: L().ctxDelete, danger: true, action: () => deleteFile(f) },

    const empty = document.createElement('div');
    empty.className = 'sb-empty';

function addDropTarget(el, dirPath) {
  el.addEventListener('dragover', (e) => {
    if (!dragFile) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    el.classList.add('drop-target');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drop-target'));
  el.addEventListener('drop', async (e) => {
    e.preventDefault();
    el.classList.remove('drop-target');
    if (!dragFile) return;
    const src = dragFile;
    dragFile = null;
    const r = await window.pywebview.api.move_path(src, dirPath);
    if (!r || r.error) { flash(L().moveFail + (r ? r.error : L().unknownErr)); return; }
    /* 열려 있는 탭이면 새 경로로 갱신 */
    const t = tabs.find(t => t.path === src);
    if (t) {
      t.path = r.path;
      if (t === activeTab) { currentPath = r.path; updatePath(); }
      renderTabs();
      saveSession();
    }
    flash(L().moveDone + r.path);
    loadDir(sidebarDir);
  });
}

function startRename(el, f) {
  const nameSpan = el.children[1];
  const input = document.createElement('input');
  input.className = 'sb-rename';
  input.value = f.name;
  nameSpan.style.display = 'none';
  el.draggable = false; // 입력 중 드래그 방지
  el.insertBefore(input, nameSpan);
  input.focus();
  const dot = f.name.lastIndexOf('.');
  input.setSelectionRange(0, dot > 0 ? dot : f.name.length);

  let done = false;
  const finish = async (commit) => {
    if (done) return;
    done = true;
    const newName = input.value.trim();
    input.remove();
    nameSpan.style.display = '';
    el.draggable = true;
    if (!commit || !newName || newName === f.name) return;
    const r = await window.pywebview.api.rename_path(f.path, newName);
    if (!r || r.error) { flash(L().renameFail + (r ? r.error : L().unknownErr)); return; }
    const t = tabs.find(t => t.path === f.path);
    if (t) {
      t.path = r.path;
      t.name = r.name;
      if (t === activeTab) { currentPath = r.path; updatePath(); }
      renderTabs();
      saveSession();
    }
    flash(L().renameDone + r.name);
    loadDir(sidebarDir);
  };
  input.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter') finish(true);
    else if (e.key === 'Escape') finish(false);
  });
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('click', (e) => e.stopPropagation());
  input.addEventListener('dblclick', (e) => e.stopPropagation());
  input.addEventListener('mousedown', (e) => e.stopPropagation());
}

async function deleteFile(f) {
  if (!confirm(L().deleteConfirm(f.name))) return;
  const r = await window.pywebview.api.delete_path(f.path);
  if (!r || r.error) { flash(L().deleteFail + (r ? r.error : L().unknownErr)); return; }
  /* 열려 있는 탭이면 닫기 (버퍼도 함께 정리) */
  const t = tabs.find(t => t.path === f.path);
  if (t) {
    t.dirty = false; // 파일 자체를 지웠으므로 저장 여부 확인 없이 닫음
    await closeTab(t);
  }
  flash(L().deleteDone + f.name);
  loadDir(sidebarDir);
}

function searchOpen() { return searchBar.classList.contains('open'); }

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* textarea 뒤 레이어에 매치 위치를 <mark>로 그림 */
function renderHighlights() {
  if (!searchOpen() || !matches.length) { highlightsEl.innerHTML = ''; return; }
  const text = editor.value;
  const qlen = searchInput.value.length;
  let html = '', last = 0;
  matches.forEach((m, i) => {
    html += escHtml(text.slice(last, m));
    html += '<mark' + (i === matchIdx ? ' class="current"' : '') + '>'
      + escHtml(text.slice(m, m + qlen)) + '</mark>';
    last = m + qlen;
  });
  html += escHtml(text.slice(last));
  highlightsEl.innerHTML = html;
  backdrop.scrollTop = editor.scrollTop;
  backdrop.scrollLeft = editor.scrollLeft;
}

/* 프리뷰의 검색 하이라이트 제거 (텍스트 노드 원상 복구) */
let previewMarks = []; // 프리뷰의 <mark> 목록 (에디터 매치 순서와 대응)

function clearPreviewHighlights() {
  preview.querySelectorAll('mark.search-hl').forEach(mk => {
    const parent = mk.parentNode;
    parent.replaceChild(document.createTextNode(mk.textContent), mk);
    parent.normalize();
  });
  previewMarks = [];
}

/* 프리뷰에서 현재 검색 위치 강조 + (scroll=true면) 화면 중앙으로 이동
   에디터 n번째 매치 ≈ 프리뷰 n번째 매치로 대응 (마크다운 기호 안 매치는 어긋날 수 있음) */
function updatePreviewCurrent(scroll) {
  previewMarks.forEach(mk => mk.classList.remove('current'));
  if (matchIdx < 0 || !previewMarks.length) return;
  const cur = previewMarks[Math.min(matchIdx, previewMarks.length - 1)];
  cur.classList.add('current');
  if (scroll) {
    const top = cur.getBoundingClientRect().top - previewScroll.getBoundingClientRect().top
      + previewScroll.scrollTop - previewScroll.clientHeight / 2;
    previewScroll.scrollTop = Math.max(0, top);
  }
}

/* 프리뷰(렌더링된 HTML)의 텍스트 노드에서 검색어를 찾아 <mark>로 감쌈
   (요소 경계를 걸치는 매치는 표시되지 않음 - 예: 굵게 처리된 글자 일부) */
function highlightPreview() {
  clearPreviewHighlights();
  if (!searchOpen()) return;
  const q = searchInput.value;
  if (!q) return;
  const needle = caseSensitive ? q : q.toLowerCase();
  const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT, null);
  const targets = [];
  let node;
  while ((node = walker.nextNode())) {
    const hay = caseSensitive ? node.nodeValue : node.nodeValue.toLowerCase();
    if (hay.includes(needle)) targets.push(node);
  }
  for (const tn of targets) {
    const text = tn.nodeValue;
    const hay = caseSensitive ? text : text.toLowerCase();
    const frag = document.createDocumentFragment();
    let last = 0, i = hay.indexOf(needle);
    while (i !== -1) {
      frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mk = document.createElement('mark');
      mk.className = 'search-hl';
      mk.textContent = text.slice(i, i + needle.length);
      frag.appendChild(mk);
      last = i + needle.length;
      i = hay.indexOf(needle, last);
    }
    frag.appendChild(document.createTextNode(text.slice(last)));
    tn.parentNode.replaceChild(frag, tn);
  }
  previewMarks = [...preview.querySelectorAll('mark.search-hl')];
  updatePreviewCurrent(false);
}

function updateSearchUI(scroll) {
  renderHighlights();
  highlightPreview();
  searchCount.textContent = searchInput.value
    ? (matches.length ? (matchIdx + 1) + '/' + matches.length : '0/0') : '';
  if (scroll && matchIdx >= 0) {
    /* 동기 스크롤이 검색 위치 이동을 덮어쓰지 않도록 잠시 잠금 */
    scrollSource = 'search';
    const cur = highlightsEl.querySelector('mark.current');
    if (cur) {
      editor.scrollTop = Math.max(0, cur.offsetTop - editor.clientHeight / 2);
      /* 가로로 벗어난 위치의 매치면 가로 스크롤로도 드러냄 */
      if (cur.offsetLeft > editor.scrollLeft + editor.clientWidth - 40 || cur.offsetLeft < editor.scrollLeft) {
        editor.scrollLeft = Math.max(0, cur.offsetLeft - editor.clientWidth / 2);
      }
      backdrop.scrollTop = editor.scrollTop;
      backdrop.scrollLeft = editor.scrollLeft;
    }
    updatePreviewCurrent(true); // 프리뷰도 현재 위치를 화면 중앙으로
    clearTimeout(scrollResetTimer);
    scrollResetTimer = setTimeout(() => scrollSource = null, 160);
    const m = matches[matchIdx];
    editor.setSelectionRange(m, m + searchInput.value.length);
    updateStats();
  }
}

/* jump=true → 커서 이후 첫 매치로 이동, false → 위치 유지(내용 변경 시 갱신용) */
function runSearch(jump) {
  const q = searchInput.value;
  matches = [];
  if (q) {
    const hay = caseSensitive ? editor.value : editor.value.toLowerCase();
    const needle = caseSensitive ? q : q.toLowerCase();
    let i = hay.indexOf(needle);
    while (i !== -1) { matches.push(i); i = hay.indexOf(needle, i + needle.length); }
  }
  if (!matches.length) {
    matchIdx = -1;
    updateSearchUI(false);
  } else if (jump) {
    const cur = editor.selectionStart;
    matchIdx = matches.findIndex(m => m >= cur);
    if (matchIdx === -1) matchIdx = 0;
    updateSearchUI(true);
  } else {
    matchIdx = Math.min(Math.max(matchIdx, 0), matches.length - 1);
    updateSearchUI(false);
  }
}

function gotoMatch(dir) {
  if (!matches.length) return;
  matchIdx = (matchIdx + dir + matches.length) % matches.length;
  updateSearchUI(true);
}

function openSearch() {
  const sel = editor.value.slice(editor.selectionStart, editor.selectionEnd);
  searchBar.classList.add('open');
  if (sel && !sel.includes('\n')) searchInput.value = sel;
  searchInput.focus();
  searchInput.select();
  runSearch(true);
}

function closeSearch() {
  searchBar.classList.remove('open');
  renderHighlights();        // 에디터 하이라이트 제거
  clearPreviewHighlights();  // 프리뷰 하이라이트 제거
  editor.focus();            // 마지막 매치가 선택된 상태로 에디터 복귀
}

/* 검색 중 내용이 바뀌면(타이핑/탭 전환) 하이라이트 갱신 */
function refreshSearch() {
  if (searchOpen()) runSearch(false);
}

document.getElementById('btn-search').addEventListener('click', () =>
  searchOpen() ? closeSearch() : openSearch());
document.getElementById('search-next').addEventListener('click', () => gotoMatch(1));
document.getElementById('search-prev').addEventListener('click', () => gotoMatch(-1));
document.getElementById('search-close').addEventListener('click', closeSearch);
searchCaseBtn.addEventListener('click', () => {
  caseSensitive = !caseSensitive;
  searchCaseBtn.classList.toggle('active', caseSensitive);
  runSearch(true);
  searchInput.focus();
});
searchInput.addEventListener('input', () => runSearch(true));
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); gotoMatch(e.shiftKey ? -1 : 1); }
});

/* 하이라이트 레이어를 textarea 스크롤(가로/세로)/크기와 동기화 */
editor.addEventListener('scroll', () => {
  backdrop.scrollTop = editor.scrollTop;
  backdrop.scrollLeft = editor.scrollLeft;
});
new ResizeObserver(() => {
  backdrop.scrollTop = editor.scrollTop;
  backdrop.scrollLeft = editor.scrollLeft;
}).observe(editor);

/* 단축키 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && ctxMenu.style.display === 'block') { hideCtxMenu(); return; }
  /* 설정창은 Esc로 닫지 않음 (X/닫기 버튼 전용) */
  if (e.key === 'Escape' && settingsOverlay.classList.contains('open')) { return; }
  if (e.key === 'Escape' && confSaveOverlay.classList.contains('open')) { closeConfSave(); return; }
  if (e.key === 'Escape' && confluenceOverlay.classList.contains('open')) { closeConfluence(); return; }
  if (e.key === 'Escape' && helpOverlay.classList.contains('open')) { closeHelp(); return; }
  if (e.key === 'Escape' && searchOpen()) { closeSearch(); return; }
  if (e.key === 'F3') {
    e.preventDefault();
    if (searchOpen()) gotoMatch(e.shiftKey ? -1 : 1);
    else openSearch();
    return;
  }
  /* Windows/Linux = Ctrl, macOS = Command(⌘) */
  if (!(IS_MAC ? e.metaKey : e.ctrlKey)) return;
  const k = e.key.toLowerCase();
  if (k === 's' && e.shiftKey) { e.preventDefault(); doSaveAs(); }
  else if (k === 's') { e.preventDefault(); doSave(); }
  else if (k === 'o') { e.preventDefault(); doOpen(); }
  else if (k === 'n') { e.preventDefault(); doNew(); }
  else if (k === 'f') {
    e.preventDefault();
    if (helpOverlay.classList.contains('open')) {
      /* 설명서 모달이 열려 있으면 설명서 검색창에 커서 활성화 */
      helpSearchInput.focus();
      helpSearchInput.select();
    } else {
      openSearch();
    }
  }
});

const divider = document.getElementById('divider');
const editorPane = document.getElementById('editor-pane');
/* 더블클릭 → 좌우 정중앙(50:50)으로 리셋 */
divider.addEventListener('dblclick', () => { editorPane.style.flex = ''; });

divider.addEventListener('mousedown', (e) => {
  e.preventDefault();
  const move = (ev) => {
    const rect = mainEl.getBoundingClientRect();
    // 사이드바가 열려 있으면 그 폭을 제외한 영역 기준으로 계산 (유격 버그 방지)
    const sbW = sidebar.getBoundingClientRect().width;
    const avail = rect.width - sbW - divider.offsetWidth;
    let px = ev.clientX - rect.left - sbW;
    px = Math.max(avail * 0.15, Math.min(avail * 0.85, px));
    editorPane.style.flex = '0 0 ' + px + 'px';
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
});

const settingsOverlay = document.getElementById('settings-overlay');
const confluenceOverlay = document.getElementById('confluence-overlay');
const btnConfluence = document.getElementById('btn-confluence');
const setEmail = document.getElementById('set-email');
const setTokenName = document.getElementById('set-tokenname');
const setToken = document.getElementById('set-token');
const setWork = document.getElementById('set-work');
const setTestResult = document.getElementById('set-test-result');
const setBackup = document.getElementById('set-backup');
const setCloudId = document.getElementById('set-cloudid');
let confTested = false;   // 이번 세션에서 테스트 통과 여부
let settingsPanel = 'general';

function setSettingsPanel(panel) {
  settingsPanel = panel;
  document.querySelectorAll('.set-nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.panel === panel));
  document.querySelectorAll('.set-panel').forEach(p =>
    p.style.display = p.dataset.panel === panel ? '' : 'none');
}

async function openSettings() {
  try {
    const cfg = await window.pywebview.api.conf_load_config();
    setEmail.value = cfg.email || '';
    setTokenName.value = cfg.token_name || '';
    setToken.value = cfg.token || '';
    setWork.value = cfg.work || '';
    setCloudId.value = cfg.cloud_id || '';
    confCloudId = cfg.cloud_id || '';
    confTested = !!cfg.verified;
  } catch (e) {}
  try {
    const s = await window.pywebview.api.settings_load();
    setBackup.value = (s && s.backup_dir) || '';
  } catch (e) {}
  setTestResult.textContent = '';
  setTestResult.className = '';
  setSettingsPanel('general');
  settingsOverlay.classList.add('open');
}
function closeSettings() { settingsOverlay.classList.remove('open'); }

document.querySelectorAll('.set-nav-item').forEach(b =>
  b.addEventListener('click', () => setSettingsPanel(b.dataset.panel)));

/* 백업 폴더 선택 / 지우기 */
document.getElementById('set-backup-choose').addEventListener('click', async () => {
  const r = await window.pywebview.api.choose_folder();
  if (r && r.path) setBackup.value = r.path;
});
document.getElementById('set-backup-clear').addEventListener('click', () => { setBackup.value = ''; });

let confCloudId = '';   // 테스트로 확보한 cloudId (저장 시 함께 보존)

function currentConfCfg() {
  return {
    email: setEmail.value.trim(),
    token_name: setTokenName.value.trim(),
    token: setToken.value.trim(),
    work: setWork.value.trim(),
    cloud_id: setCloudId.value.trim() || confCloudId,
  };
}

async function testConf() {
  setTestResult.className = '';
  setTestResult.textContent = L().setTesting;
  confCloudId = '';
  try {
    const r = await window.pywebview.api.conf_test(currentConfCfg());
    if (r && r.ok) {
      confTested = true;
      confCloudId = r.cloud_id || confCloudId;
      if (confCloudId && !setCloudId.value.trim()) setCloudId.value = confCloudId;
      let msg = L().setTestOk + (r.user || '');
      if (r.folder) msg += ' / 폴더: ' + r.folder;
      else if (r.space) msg += ' / space=' + r.space;
      setTestResult.className = 'ok';
      setTestResult.textContent = msg;
    } else {
      confTested = false;
      setTestResult.className = 'err';
      setTestResult.textContent = L().setTestFail + ((r && r.error) || L().unknownErr);
    }
  } catch (e) {
    confTested = false;
    setTestResult.className = 'err';
    setTestResult.textContent = L().setTestFail + e;
  }
}

/* 설정 저장 완료 토스트 (창은 닫지 않음) */
let setToastTimer = null;
function showSetToast(msg) {
  const el = document.getElementById('set-toast');
  el.textContent = '✅ ' + msg;
  el.classList.add('show');
  clearTimeout(setToastTimer);
  setToastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* 저장: 현재 보고 있는 패널의 설정을 저장 (저장 후에도 창은 유지) */
async function saveSettings() {
  if (settingsPanel === 'general') {
    const r = await window.pywebview.api.settings_save({ backup_dir: setBackup.value.trim() });
    if (r && r.error) { setTestResult.textContent = ''; showSetToast(r.error); return; }
    showSetToast(L().setBackupSaved);
    return;
  }
  // Confluence 패널
  if (!confTested) {
    setSettingsPanel('conf');
    setTestResult.className = 'err';
    setTestResult.textContent = L().setNeedTest;
    return;
  }
  const cfg = currentConfCfg();
  cfg.verified = true;
  const r = await window.pywebview.api.conf_save_config(cfg);
  if (r && r.error) { setTestResult.className = 'err'; setTestResult.textContent = r.error; return; }
  updateConfluenceMenu(true);
  showSetToast(L().setSaved);
}

/* ---------- Confluence 문서 탐색 ---------- */
const confListEl = document.getElementById('conf-list');

async function openConfluence() {
  confluenceOverlay.classList.add('open');
  confFilterEl.value = '';   // 열 때마다 필터 초기화 + 목록 새로고침
  await loadConfList();
  confFilterEl.focus();
}
function closeConfluence() { confluenceOverlay.classList.remove('open'); }

/* 트리의 한 노드(및 하위) 렌더링 */
function renderConfNode(node) {
  const wrap = document.createElement('div');
  wrap.className = 'conf-node';
  const row = document.createElement('div');
  row.className = 'conf-row';
  const hasChildren = node.children && node.children.length;

  const twisty = document.createElement('span');
  twisty.className = 'conf-twisty';
  twisty.textContent = hasChildren ? '▼' : '';
  const title = document.createElement('span');
  title.className = 'conf-title';
  title.textContent = (hasChildren ? '📁 ' : '📄 ') + node.title;
  title.title = L().confOpen_t + ' (id=' + node.id + ')';
  const ver = document.createElement('span');
  ver.className = 'conf-ver';
  ver.textContent = node.version ? 'v' + node.version : '';
  const del = document.createElement('button');
  del.className = 'conf-del';
  del.textContent = '🗑️';
  del.title = L().confDelete_t;
  del.addEventListener('click', (e) => { e.stopPropagation(); deleteConfPage(node); });

  row.append(twisty, title, ver, del);
  /* 제목 클릭 = 문서 열기 */
  title.addEventListener('click', () => openConfPage(node.id));
  wrap.appendChild(row);

  if (hasChildren) {
    const kids = document.createElement('div');
    kids.className = 'conf-children';
    for (const c of node.children) kids.appendChild(renderConfNode(c));
    wrap.appendChild(kids);
    /* 삼각형 클릭 = 접기/펼치기 */
    twisty.addEventListener('click', (e) => {
      e.stopPropagation();
      const collapsed = kids.classList.toggle('collapsed');
      twisty.textContent = collapsed ? '▶' : '▼';
    });
  }
  return wrap;
}

let confTreeData = [];   // 마지막으로 가져온 계층 데이터 (필터링용)
const confFilterEl = document.getElementById('conf-filter');

/* 제목 필터: 자신 또는 하위가 매칭되면 유지 (계층 구조 보존) */
function filterConfTree(nodes, q) {
  if (!q) return nodes;
  const out = [];
  for (const n of nodes) {
    const kids = filterConfTree(n.children || [], q);
    if (n.title.toLowerCase().includes(q) || kids.length) out.push({ ...n, children: kids });
  }
  return out;
}

function renderConfList() {
  const q = confFilterEl.value.trim().toLowerCase();
  const tree = filterConfTree(confTreeData, q);
  confListEl.innerHTML = '';
  if (!tree.length) {
    confListEl.innerHTML = '<div class="conf-note">' + (q ? L().confNoMatch : L().confEmpty) + '</div>';
    return;
  }
  for (const node of tree) confListEl.appendChild(renderConfNode(node));
}

/* 메뉴를 열 때마다 컨플에서 새로 가져와(새로고침) 계층 구조로 표시 */
async function loadConfList() {
  confListEl.innerHTML = '<div class="conf-note">' + L().confLoading + '</div>';
  try {
    const r = await window.pywebview.api.conf_tree();
    if (r && r.error) { confListEl.innerHTML = '<div class="conf-note">' + L().confErr + r.error + '</div>'; return; }
    /* conf_tree는 계층(tree), 폴더 없을 땐 conf_list의 평면(pages)을 반환 */
    let tree = (r && r.tree) || null;
    if (!tree && r && r.pages) tree = r.pages.map(p => ({ ...p, children: [] }));
    confTreeData = tree || [];
    renderConfList();
  } catch (e) {
    confListEl.innerHTML = '<div class="conf-note">' + L().confErr + e + '</div>';
  }
}

confFilterEl.addEventListener('input', renderConfList);

/* Confluence 페이지 삭제(휴지통 이동) */
async function deleteConfPage(p) {
  if (!confirm(L().confDeleteConfirm(p.title))) return;
  const r = await window.pywebview.api.conf_delete(p.id);
  if (!r || r.error) { flash(L().confErr + ((r && r.error) || L().unknownErr)); return; }
  /* 열려 있는 탭이면 정리 */
  const t = tabs.find(t => t.conf && t.conf.id === p.id);
  if (t) { t.dirty = false; await closeTab(t); }
  flash(L().confDeleted + p.title);
  loadConfList();
}

/* Confluence 페이지를 탭으로 열기 (원본 마크다운을 편집) */
async function openConfPage(pageId) {
  const existing = tabs.find(t => t.conf && t.conf.id === pageId);
  if (existing) { closeConfluence(); await activateTab(existing); return; }
  const r = await window.pywebview.api.conf_get(pageId);
  if (!r || r.error) { flash(L().confErr + ((r && r.error) || L().unknownErr)); return; }
  syncEditorToTab();
  const t = { path: null, name: r.title, content: r.markdown, dirty: false,
              conf: { id: r.id, version: r.version, title: r.title } };
  tabs.push(t);
  activeTab = t;
  showActiveTab();
  editor.scrollTop = 0;
  closeConfluence();
  flash(L().confOpened + r.title);
}

/* 현재 Confluence 탭 업데이트(저장) */
async function confUpdateCurrent() {
  if (!activeTab || !activeTab.conf) return;
  const c = activeTab.conf;
  const r = await window.pywebview.api.conf_update(c.id, c.title, editor.value, c.version);
  if (!r || r.error) { flash(L().confErr + ((r && r.error) || L().unknownErr)); return; }
  c.version = r.version;
  activeTab.dirty = false;
  updatePath();
  renderTabs();
  flash(L().confUpdated + c.title);
}

/* ---------- 현재 문서를 Confluence에 저장 (디렉토리 패널식 위치 탐색 + 제목 입력) ---------- */
const confSaveOverlay = document.getElementById('conf-save-overlay');
const confSaveName = document.getElementById('conf-save-name');
const confSaveTreeEl = document.getElementById('conf-save-tree');
const confSavePathEl = document.getElementById('conf-save-path');
let confPickTree = [];    // 전체 계층 데이터
let confPickStack = [];   // 현재 탐색 경로(노드 배열). 비어있으면 폴더 최상위

function confPickItem(icon, name) {
  const el = document.createElement('div');
  el.className = 'confpick-item';
  const i = document.createElement('span'); i.textContent = icon;
  const n = document.createElement('span'); n.textContent = name; n.title = name;
  el.append(i, n);
  return el;
}

/* 디렉토리 패널처럼 한 단계씩 표시: 클릭 = 폴더 진입, .. = 상위로 */
function renderConfPickLevel() {
  confSavePathEl.textContent = '📁 ' + L().confSaveRoot
    + (confPickStack.length ? ' / ' + confPickStack.map(n => n.title).join(' / ') : '');
  confSaveTreeEl.innerHTML = '';
  if (confPickStack.length) {
    const up = confPickItem('📁', '..');
    up.addEventListener('click', () => { confPickStack.pop(); renderConfPickLevel(); });
    confSaveTreeEl.appendChild(up);
  }
  const kids = confPickStack.length
    ? (confPickStack[confPickStack.length - 1].children || [])
    : confPickTree;
  if (!kids.length) {
    const note = document.createElement('div');
    note.className = 'conf-note';
    note.style.padding = '8px 14px';
    note.textContent = L().confNoSub;
    confSaveTreeEl.appendChild(note);
    return;
  }
  for (const n of kids) {
    const row = confPickItem((n.children && n.children.length) ? '📁' : '📄', n.title);
    row.addEventListener('click', () => { confPickStack.push(n); renderConfPickLevel(); });
    confSaveTreeEl.appendChild(row);
  }
}

async function openConfSave() {
  if (!activeTab) return;
  syncEditorToTab();
  /* 제목 기본값 = 현재 파일명(확장자 제외) 또는 Confluence 제목 */
  let def = activeTab.conf ? activeTab.conf.title
    : (activeTab.path ? baseName(activeTab.path).replace(/\.[^.]+$/, '') : activeTab.name);
  confSaveName.value = def || '';
  confPickStack = [];
  confSaveOverlay.classList.add('open');
  confSaveName.focus();
  confSaveName.select();
  confSaveTreeEl.innerHTML = '<div class="conf-note">' + L().confLoading + '</div>';
  confSavePathEl.textContent = '';
  try {
    const r = await window.pywebview.api.conf_tree();
    confPickTree = (r && r.tree) || (r && r.pages ? r.pages.map(p => ({ ...p, children: [] })) : []);
  } catch (e) { confPickTree = []; }
  renderConfPickLevel();
}
function closeConfSave() { confSaveOverlay.classList.remove('open'); }

async function doConfSave() {
  const title = confSaveName.value.trim();
  if (!title) { confSaveName.focus(); flash(L().confNeedTitle); return; }
  /* 저장 위치 = 현재 탐색 중인 위치 (최상위면 폴더 루트) */
  const parent = confPickStack.length ? confPickStack[confPickStack.length - 1].id : null;
  syncEditorToTab();
  const r = await window.pywebview.api.conf_create(title, editor.value, parent);
  if (!r || r.error) { flash(L().confErr + ((r && r.error) || L().unknownErr)); return; }
  if (activeTab) {
    activeTab.conf = { id: r.id, version: r.version, title: title };
    activeTab.name = title;
    activeTab.dirty = false;
    updatePath();
    renderTabs();
  }
  flash(L().confSaved + title);
  closeConfSave();
}

btnConfluence.addEventListener('click', openConfluence);
document.getElementById('btn-conf-save').addEventListener('click', openConfSave);
document.getElementById('conf-x').addEventListener('click', closeConfluence);
document.getElementById('conf-reload').addEventListener('click', loadConfList);
document.getElementById('conf-save-new').addEventListener('click', () => { closeConfluence(); openConfSave(); });
document.getElementById('conf-save-x').addEventListener('click', closeConfSave);
document.getElementById('conf-save-cancel').addEventListener('click', closeConfSave);
document.getElementById('conf-save-do').addEventListener('click', doConfSave);
confluenceOverlay.addEventListener('click', (e) => { if (e.target === confluenceOverlay) closeConfluence(); });
confSaveOverlay.addEventListener('click', (e) => { if (e.target === confSaveOverlay) closeConfSave(); });

/* ---------- 언어 토글 버튼 ---------- */
document.getElementById('lang-ko').addEventListener('click', () => setLang('ko'));
document.getElementById('lang-en').addEventListener('click', () => setLang('en'));

/* ---------- 시작 ---------- */
window.addEventListener('pywebviewready', async () => {
  // 저장된 언어 설정 복원 (기본값: 한국어)
  try {
    const saved = localStorage.getItem('jm-mdv-lang');
    if (saved === 'en' || saved === 'ko') lang = saved;
  } catch (e) {}
  applyLang();

  // 코드 하이라이트(pygments) CSS 주입
  const css = await window.pywebview.api.get_pygments_css();
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);

  // Confluence 연동이 이미 완료돼 있으면 상단 Confluence 메뉴 노출
  try {
    const ccfg = await window.pywebview.api.conf_load_config();
    if (ccfg && ccfg.verified) updateConfluenceMenu(true);
  } catch (e) {}

  // 이전 세션(열려 있던 파일들) 복원
  try {
    const sess = await window.pywebview.api.load_session();
    if (sess && sess.files && sess.files.length) {
      for (const p of sess.files) {
        const r = await window.pywebview.api.open_path(p);
        if (r) tabs.push({ path: r.path, name: baseName(r.path), content: r.content, dirty: false });
      }
      if (tabs.length) {
        activeTab = tabs[sess.active] || tabs[0];
        await window.pywebview.api.set_current(activeTab.path);
      }
    }
  } catch (e) { /* 세션 복원 실패 시 새 문서로 시작 */ }

  if (!tabs.length) {
    const first = { path: null, name: L().newDoc, content: SAMPLE, dirty: false };
    tabs.push(first);
    activeTab = first;
  }
  showActiveTab();
});
</script>
